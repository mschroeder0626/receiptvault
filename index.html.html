<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);color:#e2e8f0;min-height:100vh}
.hdr{background:rgba(15,23,42,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(148,163,184,0.1);padding:14px 20px;position:sticky;top:0;z-index:100}
.hdr-in{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}

.tabs{display:flex;gap:2px;background:rgba(30,41,59,0.8);border-radius:8px;padding:2px}

.rd{flex:1;min-width:0}.rtp{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}

.rm{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rdt{font-size:11px;color:#64748b}.rc{font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(59,130,246,0.15);color:#60a5fa;font-weight:600}
.rds{font-size:11px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.db{background:none;border:none;color:#475569;cursor:pointer;padding:6px;border-radius:6px;flex-shrink:0}
.warn{padding:10px 14px;border-radius:8px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);font-size:12px;color:#f59e0b;margin-bottom:16px}
.sp{width:56px;height:56px;border-radius:50%;border:3px solid rgba(16,185,129,0.2);border-top-color:#10b981;animation:spin 1s linear infinite;margin:0 auto}

.nf.ok{background:#166534}.nf.er{background:#991b1b}.nf.in{background:#1e40af}
@keyframes si{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
.sc{background:rgba(30,41,59,0.6);border-radius:14px;border:1px solid rgba(148,163,184,0.1);padding:20px;margin-bottom:20px}
.sct{font-size:15px;font-weight:700;margin-bottom:6px}
.scd{font-size:12px;color:#64748b;margin-bottom:14px;line-height:1.5}
.sin{width:100%;padding:10px 12px;border-radius:8px;border:1px solid rgba(148,163,184,0.2);background:rgba(15,23,42,0.8);color:#e2e8f0;font-size:13px;outline:none}
.sin:focus{border-color:#10b981}
.sinm{font-family:monospace}
.ss{margin-top:10px;font-size:12px;display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%}.dot.gn{background:#10b981}.dot.gy{background:#475569}
.es{text-align:center;padding:50px 20px;color:#475569}
.ct{text-align:center}
.g16{display:flex;flex-direction:column;gap:16px}
.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}.mb16{margin-bottom:16px}
input[type=file]{display:none}
.ebtns{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.ebtns-row{display:flex;gap:8px}
.ebtns .btn,.ebtns-row .btn{font-size:13px;padding:10px 14px}
.wiz{max-width:500px;margin:0 auto;padding:30px 20px}
.wiz-step{background:rgba(30,41,59,0.6);border-radius:16px;border:1px solid rgba(148,163,184,0.1);padding:24px;margin-bottom:16px}
.wiz-num{display:inline-flex;width:28px;height:28px;border-radius:50%;background:rgba(16,185,129,0.15);color:#10b981;font-size:13px;font-weight:700;align-items:center;justify-content:center;margin-bottom:10px}
.wiz-h{font-size:16px;font-weight:700;margin-bottom:6px}
.wiz-p{font-size:13px;color:#94a3b8;line-height:1.6;margin-bottom:14px}
.wiz-note{font-size:11px;color:#64748b;margin-top:8px;line-height:1.5;font-style:italic}
.wiz-bar{display:flex;gap:6px;margin-bottom:24px;justify-content:center}
.wiz-dot{width:10px;height:10px;border-radius:50%;background:rgba(148,163,184,0.2);transition:all .3s}
.wiz-dot.on{background:#10b981;width:24px;border-radius:5px}
.wiz-btns{display:flex;gap:10px;margin-top:20px}
.wiz-btns .btn{font-size:14px;padding:12px}
.wiz-skip{text-align:center;margin-top:14px}
.wiz-skip span{font-size:12px;color:#64748b;cursor:pointer;text-decoration:underline}
.howto{background:rgba(15,23,42,0.5);border-radius:10px;padding:14px;margin-bottom:14px}
.howto-t{font-size:13px;font-weight:600;color:#e2e8f0;margin-bottom:8px}
.howto-s{font-size:12px;color:#94a3b8;line-height:1.7}
.howto-s strong{color:#3b82f6}
.howto-c{font-size:11px;color:#64748b;margin-top:8px}
.dl-note{font-size:11px;color:#64748b;text-align:center;margin-top:4px}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
var useState=React.useState,useRef=React.useRef,useEffect=React.useEffect;
var CODES=[
{code:"5000",label:"5000 - Cost of Goods Sold"},{code:"5100",label:"5100 - Materials & Supplies"},
{code:"5200",label:"5200 - Equipment & Tools"},{code:"5300",label:"5300 - Fuel & Vehicle"},
{code:"5400",label:"5400 - Subcontractors"},{code:"6000",label:"6000 - Office Expenses"},
{code:"6100",label:"6100 - Advertising & Marketing"},{code:"6200",label:"6200 - Insurance"},
{code:"6300",label:"6300 - Meals & Entertainment"},{code:"6400",label:"6400 - Travel"},
{code:"6500",label:"6500 - Professional Services"},{code:"6600",label:"6600 - Repairs & Maintenance"},
{code:"6700",label:"6700 - Utilities"},{code:"6800",label:"6800 - Rent & Lease"},
{code:"9999",label:"9999 - Miscellaneous"}];

function fm(v){if(!v)return"";var n=parseFloat(String(v).replace(/[^0-9.\-]/g,""));return isNaN(n)?v:"$"+n.toFixed(2)}
function fd(v){if(!v)return"";try{var d=new Date(v);return isNaN(d.getTime())?v:d.toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"})}catch(e){return v}}
function fdFile(v){if(!v)return"no-date";try{var d=new Date(v);if(isNaN(d.getTime()))return v.replace(/[\/\\:*?"<>|]/g,"-");var m=String(d.getMonth()+1).padStart(2,"0");var dy=String(d.getDate()).padStart(2,"0");var y=d.getFullYear();return m+"-"+dy+"-"+y}catch(e){return"no-date"}}
function cleanName(s){return String(s||"Unknown").replace(/[\/\\:*?"<>|]/g,"").replace(/\s+/g,"_").substring(0,30)}
function ec(s){s=String(s||"");return(s.indexOf(",")>-1||s.indexOf('"')>-1||s.indexOf("\n")>-1)?'"'+s.replace(/"/g,'""')+'"':s}
function compress(u,mw,q){return new Promise(function(ok){var img=new Image();img.onload=function(){var w=img.width,h=img.height;if(w>mw){h=Math.round(h*mw/w);w=mw}var c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);ok(c.toDataURL("image/jpeg",q))};img.onerror=function(){ok(u)};img.src=u})}
function LS(k,d){try{var v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch(e){return d}}
function SS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

function makeFileName(r){
  var vendor=cleanName(r.vendor);
  var date=fdFile(r.date);
  var amt=parseFloat(String(r.amount).replace(/[^0-9.\-]/g,""))||0;
  return vendor+"_"+date+"_$"+amt.toFixed(2)+".jpg";
}

function downloadImage(r){
  var fname=makeFileName(r);
  var a=document.createElement("a");
  a.href=r.image;
  a.download=fname;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function downloadAllImages(list){
  var delay=0;
  list.forEach(function(r){
    setTimeout(function(){downloadImage(r)},delay);
    delay+=500;
  });
}

function buildCSV(list,nm){
  var h="Date,Vendor,Amount,Accounting Code,Code Description,Description,Image Filename,Submitted By,Captured";
  var rows=list.map(function(r){var co=CODES.find(function(c){return c.code===r.code});var a=parseFloat(String(r.amount).replace(/[^0-9.\-]/g,""))||0;
  return[ec(fd(r.date)),ec(r.vendor),a.toFixed(2),ec(r.code),ec(co?co.label:r.code),ec(r.description),ec(makeFileName(r)),ec(nm),ec(new Date(r.ts).toLocaleString())].join(",")});
  return h+"\n"+rows.join("\n")}

function App(){
  var _sd=useState(function(){return LS("rv_setup",false)}),setupDone=_sd[0],setSD=_sd[1];
  var _ws=useState(0),wStep=_ws[0],setWS=_ws[1];
  var _k=useState(function(){return LS("rv_key","")}),apiKey=_k[0],setKey=_k[1];
  var _em=useState(function(){return LS("rv_email","")}),email=_em[0],setEmail=_em[1];
  var _nm=useState(function(){return LS("rv_name","")}),name=_nm[0],setName=_nm[1];
  var _r=useState(function(){return LS("rv_data",[])}),receipts=_r[0],setR=_r[1];
  var _ai=useState(function(){return LS("rv_autosave",true)}),autoSaveImg=_ai[0],setAutoSave=_ai[1];
  var _c=useState(null),cur=_c[0],setCur=_c[1];
  var _p=useState(false),proc=_p[0],setProc=_p[1];
  var _m=useState(""),msg=_m[0],setMsg=_m[1];
  var _v=useState("capture"),view=_v[0],setView=_v[1];
  var _ef=useState(null),ef=_ef[0],setEf=_ef[1];
  var _fc=useState("all"),fc=_fc[0],setFc=_fc[1];
  var _nf=useState(null),notif=_nf[0],setNf=_nf[1];
  var camR=useRef(null),fileR=useRef(null);

  useEffect(function(){SS("rv_data",receipts)},[receipts]);
  useEffect(function(){SS("rv_key",apiKey)},[apiKey]);
  useEffect(function(){SS("rv_email",email)},[email]);
  useEffect(function(){SS("rv_name",name)},[name]);
  useEffect(function(){SS("rv_setup",setupDone)},[setupDone]);
  useEffect(function(){SS("rv_autosave",autoSaveImg)},[autoSaveImg]);

  function notify(m,t){setNf({msg:m,type:t||"ok"});setTimeout(function(){setNf(null)},3500)}

  async function callAI(b64){
    if(!apiKey)return null;
    try{
      setMsg("Sending to AI...");
      var r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
            {type:"text",text:"Extract from this receipt image. Return ONLY a JSON object, no markdown, no explanation: {\"date\":\"YYYY-MM-DD\",\"vendor\":\"store name\",\"amount\":\"total as number like 9.71\",\"description\":\"brief description of items\"}"}
          ]}]})
      });
      setMsg("Reading AI response...");
      if(!r.ok){
        var et="";try{et=await r.text()}catch(x){}
        if(r.status===401)notify("Invalid API key. Check Settings.","er");
        else if(r.status===429)notify("Too many requests. Wait a moment.","er");
        else notify("AI error ("+r.status+")","er");
        return null}
      var d=await r.json(),txt="";
      if(d.content)for(var i=0;i<d.content.length;i++)if(d.content[i].text)txt+=d.content[i].text;
      if(!txt)return null;
      var c=txt.replace(/```json/g,"").replace(/```/g,"").trim();
      var s=c.indexOf("{"),e=c.lastIndexOf("}");
      if(s>-1&&e>-1)c=c.substring(s,e+1);
      var p=JSON.parse(c);
      return{date:p.date||"",vendor:p.vendor||"",amount:p.amount||"",description:p.description||""};
    }catch(err){console.error("AI error:",err);return null}
  }

  async function onFile(f){
    if(!f)return;setProc(true);setMsg("Reading image...");
    var rd=new FileReader();
    rd.onload=async function(e){
      var u=e.target.result;setMsg("Compressing...");
      var comp=await compress(u,1200,0.7);var b=comp.split(",")[1];
      var kb=Math.round(b.length*0.75/1024);
      setMsg("Image ready ("+kb+"KB). Calling AI...");
      var res=apiKey?await callAI(b):null;
      if(res){
        setCur({id:Date.now().toString(),image:comp,date:res.date,vendor:res.vendor,amount:res.amount,description:res.description,code:"",manual:false,ts:new Date().toISOString()});
        setProc(false);setMsg("");setView("review");notify("AI read the receipt!","ok");
      }else{
        setCur({id:Date.now().toString(),image:comp,date:"",vendor:"",amount:"",description:"",code:"",manual:true,ts:new Date().toISOString()});
        setProc(false);setMsg("");setView("review");
        if(!apiKey)notify("No API key. Enter details manually.","in");
      }
    };rd.onerror=function(){setProc(false);setMsg("");notify("Can't read file","er")};rd.readAsDataURL(f)}

  function save(){
    if(!cur)return;
    if(!cur.code){notify("Select an accounting code","er");return}
    var saved=Object.assign({},cur);
    // Auto-download receipt image with proper name
    if(autoSaveImg&&saved.image&&saved.vendor){
      setTimeout(function(){downloadImage(saved)},300);
    }
    setR(function(p){return[saved].concat(p)});
    setCur(null);setView("history");
    notify("Receipt saved!"+(autoSaveImg?" Image downloading...":""));
  }

  function del(id){setR(function(p){return p.filter(function(r){return r.id!==id})});notify("Deleted","in")}

  function doExport(){
    var list=fc==="all"?receipts:receipts.filter(function(r){return r.code===fc});
    if(!list.length){notify("Nothing to export","er");return}
    var csv=buildCSV(list,name||"Unknown");var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    var u=URL.createObjectURL(blob);var a=document.createElement("a");a.href=u;
    a.download="receipts_"+(name?name.replace(/\s+/g,"_")+"_":"")+new Date().toISOString().slice(0,10)+".csv";
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
    notify("Exported "+list.length+" receipts")}

  function doDownloadImages(){
    var list=fc==="all"?receipts:receipts.filter(function(r){return r.code===fc});
    if(!list.length){notify("No receipts","er");return}
    notify("Downloading "+list.length+" images...","in");
    downloadAllImages(list);
  }

  function doEmail(){
    var list=fc==="all"?receipts:receipts.filter(function(r){return r.code===fc});
    if(!list.length){notify("No receipts to send","er");return}
    if(!email){notify("Set a Send To email in Settings first","er");setView("settings");return}
    var subj="Receipt Report"+(name?" from "+name:"")+" - "+new Date().toLocaleDateString();
    var tot=list.reduce(function(s,r){return s+(parseFloat(String(r.amount).replace(/[^0-9.\-]/g,""))||0)},0);
    var body="Receipt Report\n"+(name?"Submitted by: "+name+"\n":"")+"Receipts: "+list.length+"\nTotal: $"+tot.toFixed(2)+"\nDate: "+new Date().toLocaleDateString()+"\n\n--- Receipt Details ---\n\n";
    list.forEach(function(r,i){var co=CODES.find(function(c){return c.code===r.code});
      body+=(i+1)+". "+fd(r.date)+" | "+(r.vendor||"N/A")+" | "+fm(r.amount)+" | "+(co?co.label:r.code)+(r.description?" | "+r.description:"")+" | Image: "+makeFileName(r)+"\n"});
    body+="\nNote: Receipt images and CSV file should be attached separately.\nUse the Download Images and Export CSV buttons in the app to get the files, then attach them to this email.";
    window.location.href="mailto:"+encodeURIComponent(email)+"?subject="+encodeURIComponent(subj)+"&body="+encodeURIComponent(body);
    notify("Opening email...")}

  function upd(k,v){setCur(function(p){var o=Object.assign({},p);o[k]=v;return o});setEf(null)}

  var hasKey=apiKey&&apiKey.length>10;
  var hasEmail=email&&email.indexOf("@")>0;

  // ===== SETUP WIZARD =====
  if(!setupDone){return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e293b,#0f172a)",fontFamily:"-apple-system,system-ui,sans-serif",color:"#e2e8f0"}}>
    <div className="wiz">
      <div className="ct" style={{marginBottom:30}}>
        <div style={{width:64,height:64,borderRadius:16,background:"linear-gradient(135deg,#10b981,#059669)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12}}>
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1z"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
        </div>
        <div style={{fontSize:24,fontWeight:700,marginBottom:4}}>Welcome to ReceiptVault</div>
        <div style={{fontSize:14,color:"#64748b"}}>Quick setup - about 60 seconds</div>
      </div>
      <div className="wiz-bar">{[0,1,2].map(function(i){return <div key={i} className={"wiz-dot"+(wStep===i?" on":"")}></div>})}</div>

      {wStep===0?(<div>
        <div className="wiz-step"><div className="wiz-num">1</div><div className="wiz-h">What's your name?</div>
          <div className="wiz-p">Shows on receipt reports so the recipient knows who sent them.</div>
          <input className="sin" placeholder="e.g. John Smith" value={name} onChange={function(e){setName(e.target.value)}} autoFocus/></div>
        <div className="wiz-btns"><button className="btn bg" onClick={function(){setWS(1)}} disabled={!name.trim()}>Next</button></div>
      </div>):null}

      {wStep===1?(<div>
        <div className="wiz-step"><div className="wiz-num">2</div><div className="wiz-h">Where should reports go?</div>
          <div className="wiz-p">Enter the email address where receipt reports should be sent.</div>
          <input className="sin" type="email" placeholder="receipts@company.com" value={email} onChange={function(e){setEmail(e.target.value)}} autoFocus/>
          <div className="wiz-note">Each person sets their own destination. Change anytime in Settings.</div></div>
        <div className="wiz-btns">
          <button className="btn bo" onClick={function(){setWS(0)}} style={{width:"auto",minWidth:80}}>Back</button>
          <button className="btn bg" onClick={function(){setWS(2)}} disabled={!hasEmail}>Next</button></div>
      </div>):null}

      {wStep===2?(<div>
        <div className="wiz-step"><div className="wiz-num">3</div><div className="wiz-h">AI Receipt Reading (Optional)</div>
          <div className="wiz-p">An API key lets AI automatically read receipts. Without it, type details manually (~15 sec per receipt).</div>
          <div className="howto"><div className="howto-t">How to get a key:</div>
            <div className="howto-s">1. Go to <strong>console.anthropic.com</strong><br/>2. Create a free account<br/>3. Add a payment method<br/>4. Click <strong>API Keys</strong> in sidebar<br/>5. Click <strong>Create Key</strong><br/>6. Copy and paste below</div>
            <div className="howto-c">Cost: ~$0.01-0.03 per receipt. ~$1-3/month for 100 receipts.</div></div>
          <input className="sin sinm" type="password" placeholder="sk-ant-api03-..." value={apiKey} onChange={function(e){setKey(e.target.value)}}/>
          {hasKey?(<div className="ss"><span className="dot gn"></span><span style={{color:"#10b981"}}>Key entered - AI reading enabled</span></div>):null}</div>
        <div className="wiz-btns">
          <button className="btn bo" onClick={function(){setWS(1)}} style={{width:"auto",minWidth:80}}>Back</button>
          <button className="btn bg" onClick={function(){setSD(true);notify("You're all set, "+name.split(" ")[0]+"!")}}>{hasKey?"Finish Setup":"Skip - Manual Entry"}</button></div>
        {!apiKey?(<div className="wiz-skip"><span onClick={function(){setSD(true);notify("You're all set!")}}>Add a key later in Settings</span></div>):null}
      </div>):null}
    </div></div>)}

  // ===== MAIN APP =====
  var filtered=fc==="all"?receipts:receipts.filter(function(r){return r.code===fc});
  var total=filtered.reduce(function(s,r){return s+(parseFloat(String(r.amount).replace(/[^0-9.\-]/g,""))||0)},0);
  var uc=[];filtered.forEach(function(r){if(uc.indexOf(r.code)===-1)uc.push(r.code)});
  var fields=cur?[{k:"date",l:"Date",d:cur.date?fd(cur.date):"",ph:"MM/DD/YYYY"},{k:"vendor",l:"Vendor",d:cur.vendor,ph:"Store name"},{k:"amount",l:"Amount",d:cur.amount?fm(cur.amount):"",ph:"0.00"},{k:"description",l:"Notes",d:cur.description,ph:"What was purchased"}]:[];

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e293b,#0f172a)",fontFamily:"-apple-system,system-ui,sans-serif",color:"#e2e8f0"}}>
    {notif?<div className={"nf "+(notif.type||"ok")}>{notif.msg}</div>:null}
    <div className="hdr"><div className="hdr-in">
      <div className="logo">
        <div className="logo-i"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1z"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg></div>
        <div><div className="logo-t">ReceiptVault</div><div className="logo-s">{name}</div></div>
      </div>
      <div className="tabs">
        <button className={"tab"+((view==="capture"||view==="review")?" on":"")} onClick={function(){setView("capture")}}>Capture</button>
        <button className={"tab"+(view==="history"?" on":"")} onClick={function(){setView("history")}}>{"History ("+receipts.length+")"}</button>
        <button className={"tab"+(view==="settings"?" on":"")} onClick={function(){setView("settings")}}>Settings</button>
      </div>
    </div></div>
    <div className="cnt">

      {/* SETTINGS */}
      {view==="settings"?(<div>
        <h2 style={{fontSize:20,fontWeight:700,marginBottom:16}}>Settings</h2>
        <div className="sc"><div className="sct">Your Name</div><div className="scd">Appears on exported reports.</div>
          <input className="sin" value={name} onChange={function(e){setName(e.target.value)}}/></div>
        <div className="sc"><div className="sct">Send Reports To</div><div className="scd">Email where receipt reports are sent.</div>
          <input className="sin" type="email" placeholder="receipts@company.com" value={email} onChange={function(e){setEmail(e.target.value)}}/>
          <div className="ss"><span className={"dot "+(hasEmail?"gn":"gy")}></span><span style={{color:hasEmail?"#10b981":"#64748b"}}>{hasEmail?"Reports go to "+email:"No email set"}</span></div></div>
        <div className="sc"><div className="sct">Anthropic API Key</div><div className="scd">Enables AI receipt reading. Get yours from console.anthropic.com</div>
          <input className="sin sinm" type="password" placeholder="sk-ant-api03-..." value={apiKey} onChange={function(e){setKey(e.target.value)}}/>
          <div className="ss"><span className={"dot "+(hasKey?"gn":"gy")}></span><span style={{color:hasKey?"#10b981":"#64748b"}}>{hasKey?"AI reading enabled":"Manual entry only"}</span></div></div>
        <div className="sc"><div className="sct">Auto-Save Receipt Images</div>
          <div className="scd">When enabled, receipt images automatically download to your device when you save a receipt. Images are named: <b>Vendor_Date_Amount.jpg</b></div>
          <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={function(){setAutoSave(!autoSaveImg)}}>
            <div style={{width:44,height:24,borderRadius:12,background:autoSaveImg?"#10b981":"#475569",padding:2,transition:"all .2s"}}>
              <div style={{width:20,height:20,borderRadius:10,background:"#fff",transform:autoSaveImg?"translateX(20px)":"translateX(0)",transition:"all .2s"}}></div>
            </div>
            <span style={{fontSize:13,color:autoSaveImg?"#10b981":"#94a3b8"}}>{autoSaveImg?"On":"Off"}</span>
          </div></div>
        <div className="sc"><div className="sct">Data</div><div className="scd">{receipts.length+" receipt"+(receipts.length!==1?"s":"")+" on this device."}</div>
          {receipts.length>0?<button className="btn bo" onClick={function(){if(confirm("Delete ALL receipts? Cannot undo.")){setR([]);notify("All deleted","in")}}}>Clear All Receipts</button>:null}
          <button className="btn bo mt12" onClick={function(){setSD(false);setWS(0)}}>Re-run Setup Wizard</button></div>
      </div>):null}

      {/* CAPTURE */}
      {view==="capture"&&!proc?(<div>
        <div className="ct mt20">
          <h2 style={{fontSize:24,fontWeight:700,color:"#10b981",marginBottom:6}}>Capture a Receipt</h2>
          <p style={{color:"#64748b",fontSize:14}}>{hasKey?"Take a photo or upload - AI reads it automatically":"Take a photo or upload, then enter details"}</p>
          {!hasKey?<p style={{color:"#f59e0b",fontSize:12,marginTop:6}}>Add an API key in Settings to enable AI reading</p>:null}
        </div>
        <div className="ca">
          <div className="cb g" onClick={function(){camR.current&&camR.current.click()}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><span>Take Photo</span></div>
          <input ref={camR} type="file" accept="image/*,.heic,.heif" capture="environment" onChange={function(e){if(e.target.files&&e.target.files[0])onFile(e.target.files[0]);e.target.value=""}}/>
          <div className="cb b" onClick={function(){fileR.current&&fileR.current.click()}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span>Upload</span></div>
          <input ref={fileR} type="file" accept="image/*,.heic,.heif" onChange={function(e){if(e.target.files&&e.target.files[0])onFile(e.target.files[0]);e.target.value=""}}/>
        </div>
        {receipts.length>0?(<div className="ct mt20" style={{padding:14,borderRadius:10,background:"rgba(30,41,59,0.5)",border:"1px solid rgba(148,163,184,0.1)"}}>
          <span style={{color:"#64748b",fontSize:13}}>You have </span><span style={{color:"#10b981",fontWeight:700,fontSize:13}}>{receipts.length+" receipt"+(receipts.length!==1?"s":"")}</span>
          <span style={{color:"#64748b",fontSize:13}}> saved. </span><span style={{color:"#3b82f6",cursor:"pointer",fontWeight:600,fontSize:13}} onClick={function(){setView("history")}}>View History</span>
        </div>):null}
      </div>):null}

      {/* PROCESSING */}
      {proc?(<div className="ct" style={{paddingTop:60}}>
        <div className="sp"></div>
        <div style={{marginTop:20}}><div style={{fontSize:17,fontWeight:600,marginBottom:6}}>Reading receipt...</div><div style={{color:"#64748b",fontSize:13}}>{msg||"Processing"}</div></div>
      </div>):null}

      {/* REVIEW */}
      {view==="review"&&cur&&!proc?(<div className="g16">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <h2 style={{fontSize:20,fontWeight:700}}>{cur.manual?"Enter Details":"Review & Code"}</h2>
          <button style={{padding:"6px 14px",borderRadius:6,border:"1px solid rgba(148,163,184,0.2)",background:"transparent",color:"#94a3b8",cursor:"pointer",fontSize:12}} onClick={function(){setCur(null);setView("capture")}}>Cancel</button>
        </div>
        <div className="ri"><img src={cur.image} alt="Receipt"/></div>
        {cur.manual?<div className="warn">AI could not read this receipt. Enter details below.</div>:null}
        <div className="card">
          {!cur.manual?<div className="ch"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg> AI-Extracted - tap to edit</div>:null}
          {fields.map(function(f){return(
            <div className="fr" key={f.k}><span className="fl">{f.l}</span>
              {ef===f.k?(<input className="fi" autoFocus defaultValue={cur[f.k]} placeholder={f.ph} onBlur={function(e){upd(f.k,e.target.value)}} onKeyDown={function(e){if(e.key==="Enter"){e.target.blur()}}}/>
              ):(<div className={"fv"+(!f.d||f.d==="UNKNOWN"?" mt":"")} onClick={function(){setEf(f.k)}}><span>{f.d||f.ph}</span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>)}
            </div>)})}
        </div>
        <div className="card" style={{padding:16}}>
          <label style={{fontSize:12,fontWeight:600,color:"#94a3b8",display:"block",marginBottom:8}}>Accounting Code *</label>
          <select value={cur.code} onChange={function(e){setCur(function(p){return Object.assign({},p,{code:e.target.value})})}}><option value="">-- Select Code --</option>
            {CODES.map(function(c){return <option key={c.code} value={c.code}>{c.label}</option>})}</select>
        </div>
        <button className="btn bg" disabled={!cur.code} onClick={save}>Save Receipt</button>
        {autoSaveImg?<div className="dl-note">Receipt image will auto-download when saved</div>:null}
      </div>):null}

      {/* HISTORY */}
      {view==="history"?(<div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:14}}>
          <h2 style={{fontSize:20,fontWeight:700}}>Receipt History</h2>
          <select value={fc} onChange={function(e){setFc(e.target.value)}} style={{padding:"6px 10px",fontSize:12,width:"auto"}}><option value="all">All Codes</option>
            {CODES.map(function(c){return <option key={c.code} value={c.code}>{c.label}</option>})}</select>
        </div>
        {filtered.length>0?(<div className="su">
          <div className="si"><div className="sl">RECEIPTS</div><div className="sv">{filtered.length}</div></div>
          <div className="si"><div className="sl">TOTAL</div><div className="sv">{"$"+total.toFixed(2)}</div></div>
          <div className="si"><div className="sl">CODES</div><div className="sv">{uc.length}</div></div>
        </div>):null}
        {filtered.length>0?(<div className="ebtns">
          <button className="btn bg" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6}} onClick={doEmail}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> Email Summary</button>
          <div className="ebtns-row">
            <button className="btn bb" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}} onClick={doDownloadImages}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> Download Images</button>
            <button className="btn bo" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4}} onClick={doExport}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export CSV</button>
          </div>
          <div className="dl-note">Download images + CSV, then attach both to your email</div>
        </div>):null}
        {filtered.length===0?(<div className="es">
          <div style={{fontSize:40,marginBottom:12,opacity:.3}}>{"\uD83D\uDCC4"}</div>
          <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>No receipts yet</div>
          <div style={{fontSize:13}}>Capture your first receipt to get started</div>
          <button className="btn bg mt16" style={{width:"auto",display:"inline-block",padding:"10px 20px"}} onClick={function(){setView("capture")}}>Capture Receipt</button>
        </div>):filtered.map(function(r){return(
          <div className="rr" key={r.id}>
            <div className="rt" onClick={function(){downloadImage(r)}} style={{cursor:"pointer"}}><img src={r.image} alt=""/></div>
            <div className="rd"><div className="rtp"><span className="rv">{r.vendor||"No vendor"}</span><span className="ra">{fm(r.amount)}</span></div>
              <div className="rm"><span className="rdt">{fd(r.date)||"No date"}</span><span className="rc">{r.code}</span>{r.description?<span className="rds">{r.description}</span>:null}</div></div>
            <button className="db" onClick={function(){del(r.id)}}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
          </div>)})}
      </div>):null}

    </div></div>);
}
ReactDOM.render(React.createElement(App),document.getElementById("app"));
</script>
</body>
</html>
