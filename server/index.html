<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ReceiptVault">
<meta name="theme-color" content="#ffffff">
<meta name="description" content="Capture, organize, and sync business receipts from anywhere. Camera, upload, drag & drop, or email.">
<title>ReceiptVault — Business Receipt Management</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --ink:       #0f1923;
    --ink2:      #2d3d4f;
    --ink3:      #64748b;
    --rule:      #e2e8f0;
    --rule2:     #f1f5f9;
    --paper:     #ffffff;
    --paper2:    #f8fafc;
    --paper3:    #f1f5f9;
    --blue:      #1d6fbf;
    --blue-lt:   #eff6ff;
    --blue-mid:  #dbeafe;
    --green:     #16a34a;
    --green-lt:  #f0fdf4;
    --amber:     #d97706;
    --amber-lt:  #fffbeb;
    --red:       #dc2626;
    --shadow-sm: 0 1px 3px rgba(15,25,35,0.08), 0 1px 2px rgba(15,25,35,0.04);
    --shadow-md: 0 4px 12px rgba(15,25,35,0.08), 0 2px 4px rgba(15,25,35,0.04);
    --shadow-lg: 0 16px 40px rgba(15,25,35,0.10), 0 4px 8px rgba(15,25,35,0.04);
    --radius:    12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body { height: 100%; background: var(--paper2); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; overflow: hidden; }

  /* ── LAYOUT ── */
  #app { display: flex; flex-direction: column; height: 100%; max-width: 600px; margin: 0 auto; background: var(--paper); box-shadow: var(--shadow-lg); position: relative; }

  /* ── HEADER ── */
  header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--rule);
    display: flex; align-items: center; gap: 12px;
    background: var(--paper);
    position: sticky; top: 0; z-index: 10;
    flex-shrink: 0;
  }
  .logo-mark {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--blue) 0%, #1a4fa0 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; box-shadow: 0 2px 8px rgba(29,111,191,0.3);
    flex-shrink: 0;
  }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--ink); letter-spacing: -0.02em; }
  .logo-text span { color: var(--blue); }
  .header-tag { margin-left: auto; font-size: 11px; color: var(--ink3); background: var(--paper3); border: 1px solid var(--rule); padding: 3px 9px; border-radius: 20px; font-weight: 500; letter-spacing: 0.02em; }

  /* ── TABS ── */
  .tabs { display: flex; border-bottom: 1px solid var(--rule); background: var(--paper); flex-shrink: 0; padding: 0 16px; gap: 2px; }
  .tab { padding: 11px 14px; font-size: 13px; font-weight: 500; color: var(--ink3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; white-space: nowrap; }
  .tab:hover { color: var(--ink2); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab-badge { display: inline-block; background: var(--amber); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 10px; margin-left: 5px; vertical-align: middle; }

  /* ── MAIN SCROLL ── */
  main { flex: 1; overflow-y: auto; overscroll-behavior: contain; }
  main::-webkit-scrollbar { width: 4px; }
  main::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }

  /* ── PANELS ── */
  .panel-wrap { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

  /* ── STATS ROW ── */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .stat-card { background: var(--paper); border: 1px solid var(--rule); border-radius: var(--radius); padding: 14px 12px; box-shadow: var(--shadow-sm); }
  .stat-label { font-size: 10px; font-weight: 600; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--ink); line-height: 1; margin-bottom: 2px; font-family: 'DM Mono', monospace; }
  .stat-value.blue  { color: var(--blue); }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }
  .stat-sub { font-size: 10px; color: var(--ink3); }

  /* ── UPLOAD CARD ── */
  .upload-card { background: var(--paper); border: 1px solid var(--rule); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
  .upload-card-header { padding: 14px 16px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; gap: 10px; }
  .upload-card-title { font-size: 13px; font-weight: 600; color: var(--ink); }
  .upload-card-sub { font-size: 11px; color: var(--ink3); margin-top: 1px; }
  .upload-card-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  /* ── DROP ZONE ── */
  .dropzone {
    border: 2px dashed var(--rule); border-radius: 10px;
    padding: 28px 20px; text-align: center;
    background: var(--paper2); cursor: pointer;
    transition: all 0.2s;
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--blue); background: var(--blue-lt);
  }
  .dropzone-icon { font-size: 32px; margin-bottom: 8px; }
  .dropzone-label { font-size: 14px; font-weight: 500; color: var(--ink2); margin-bottom: 3px; }
  .dropzone-sub { font-size: 12px; color: var(--ink3); }
  .dropzone-link { color: var(--blue); font-weight: 500; text-decoration: none; }

  /* ── METHOD BUTTONS ── */
  .method-grid { display: grid; grid-template-columns: repeat(1, 1fr); gap: 8px; }
  .method-btn {
    border: 1px solid var(--rule); border-radius: 10px; padding: 14px 10px;
    text-align: center; background: var(--paper2); cursor: pointer;
    transition: all 0.15s; display: block; text-decoration: none;
  }
  .method-btn:hover { border-color: var(--blue); background: var(--blue-lt); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .method-icon { font-size: 22px; margin-bottom: 6px; }
  .method-label { font-size: 12px; font-weight: 600; color: var(--ink); display: block; margin-bottom: 2px; }
  .method-sub { font-size: 10px; color: var(--ink3); }

  /* ── EMAIL INFO DRAWER ── */
  .email-drawer {
    background: var(--blue-lt); border: 1px solid var(--blue-mid);
    border-radius: 10px; padding: 14px 16px; display: none;
  }
  .email-drawer.open { display: block; }
  .email-address {
    font-family: 'DM Mono', monospace; font-size: 13px;
    background: var(--paper); border: 1px solid var(--blue-mid);
    border-radius: 7px; padding: 10px 12px; color: var(--ink);
    margin: 8px 0; word-break: break-all; cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .email-address:hover { background: var(--blue-mid); }
  .copy-btn { font-size: 11px; color: var(--blue); font-family: 'DM Sans', sans-serif; font-weight: 600; flex-shrink: 0; }

  /* ── UPLOAD PREVIEW ── */
  .upload-preview { display: flex; flex-direction: column; gap: 8px; }
  .preview-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--paper2); border: 1px solid var(--rule);
    border-radius: 9px; padding: 10px 12px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .preview-thumb { width: 44px; height: 44px; border-radius: 7px; object-fit: cover; border: 1px solid var(--rule); flex-shrink: 0; }
  .preview-thumb-placeholder { width: 44px; height: 44px; border-radius: 7px; background: var(--paper3); border: 1px solid var(--rule); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .preview-info { flex: 1; min-width: 0; }
  .preview-name { font-size: 12px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .preview-meta { font-size: 11px; color: var(--ink3); margin-top: 2px; }
  .preview-status { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 5px; flex-shrink: 0; }
  .preview-status.processing { background: var(--amber-lt); color: var(--amber); border: 1px solid #fde68a; }
  .preview-status.done { background: var(--green-lt); color: var(--green); border: 1px solid #bbf7d0; }
  .preview-status.error { background: #fef2f2; color: var(--red); border: 1px solid #fecaca; }

  /* ── RECEIPT NAME INLINE EDIT ── */
  .receipt-name-wrap { display: flex; align-items: center; gap: 4px; }
  .receipt-name-display { font-size: 12px; font-weight: 500; color: var(--ink); cursor: pointer; border-bottom: 1px dashed transparent; transition: border-color 0.15s; }
  .receipt-name-display:hover { border-bottom-color: var(--blue); color: var(--blue); }
  .receipt-name-input {
    font-size: 12px; font-weight: 500; color: var(--ink); border: none;
    border-bottom: 1px solid var(--blue); background: transparent; outline: none;
    font-family: 'DM Sans', sans-serif; width: 100%; padding: 0;
  }
  .edit-hint { font-size: 10px; color: var(--ink3); opacity: 0; transition: opacity 0.2s; }
  .preview-info:hover .edit-hint { opacity: 1; }

  /* ── RECEIPT TABLE ── */
  .receipt-table-wrap { background: var(--paper); border: 1px solid var(--rule); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
  .table-header { padding: 14px 16px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; justify-content: space-between; }
  .table-title { font-size: 13px; font-weight: 600; color: var(--ink); }
  .table-count { font-size: 12px; color: var(--ink3); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--paper2); border-bottom: 1px solid var(--rule); }
  th { padding: 9px 14px; font-size: 10px; font-weight: 700; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.06em; text-align: left; }
  th.right { text-align: right; }
  td { padding: 12px 14px; border-bottom: 1px solid var(--rule); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--paper2); }
  .vendor-name { font-size: 13px; font-weight: 500; color: var(--ink); }
  .vendor-emp { font-size: 11px; color: var(--ink3); margin-top: 1px; }
  .amount { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; color: var(--ink); text-align: right; }
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 5px; }
  .badge.synced  { background: var(--green-lt); color: var(--green); border: 1px solid #bbf7d0; }
  .badge.pending { background: var(--amber-lt); color: var(--amber); border: 1px solid #fde68a; }
  .badge.cat     { background: var(--paper3); color: var(--ink2); border: 1px solid var(--rule); }
  .via-icon { font-size: 14px; cursor: default; }

  /* ── MOBILE BOTTOM NAV ── */
  .bottom-bar {
    border-top: 1px solid var(--rule); padding: 12px 20px;
    background: var(--paper); flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--ink3);
  }
  .bottom-cta {
    background: var(--blue); color: #fff;
    border: none; border-radius: 8px; padding: 9px 16px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    box-shadow: 0 2px 8px rgba(29,111,191,0.3);
    transition: all 0.15s;
  }
  .bottom-cta:hover { background: #1a5fa8; transform: translateY(-1px); }

  /* ── EMPTY STATE ── */
  .empty-state { padding: 60px 30px; text-align: center; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--ink2); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; color: var(--ink3); line-height: 1.6; }

  /* ── EXPORT ── */
  .export-bar { background: var(--paper); border: 1px solid var(--rule); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .export-bar-title { font-size: 13px; font-weight: 600; color: var(--ink); flex: 1; min-width: 120px; }
  .export-btn { padding: 9px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; border: none; transition: all 0.15s; white-space: nowrap; }
  .export-btn.primary { background: var(--blue); color: #fff; box-shadow: 0 2px 8px rgba(29,111,191,0.3); }
  .export-btn.primary:hover { background: #1a5fa8; transform: translateY(-1px); }
  .export-btn.secondary { background: var(--paper2); color: var(--ink2); border: 1px solid var(--rule); }
  .export-btn.secondary:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-lt); }
  .export-select-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--ink3); }
  .export-select-row input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--blue); cursor: pointer; }
  .export-modal-overlay { position: fixed; inset: 0; background: rgba(15,25,35,0.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; padding: 20px; animation: fadeIn 0.2s ease; }
  .export-modal { background: var(--paper); border-radius: 20px 20px 16px 16px; width: 100%; max-width: 500px; padding: 28px 24px 32px; box-shadow: var(--shadow-lg); animation: slideUp 0.25s cubic-bezier(0.16,1,0.3,1); }
  @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .export-modal-title { font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 4px; letter-spacing: -0.02em; }
  .export-modal-sub { font-size: 13px; color: var(--ink3); margin-bottom: 20px; line-height: 1.5; }
  .export-field { margin-bottom: 14px; }
  .export-label { display: block; font-size: 11px; font-weight: 600; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .export-input { width: 100%; padding: 11px 13px; border: 1.5px solid var(--rule); border-radius: 9px; font-size: 14px; color: var(--ink); background: var(--paper2); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.15s; }
  .export-input:focus { border-color: var(--blue); background: var(--paper); }
  .export-summary { background: var(--paper2); border: 1px solid var(--rule); border-radius: 9px; padding: 12px 14px; margin-bottom: 16px; font-size: 12px; color: var(--ink3); line-height: 1.8; }
  .export-summary strong { color: var(--ink); }
  .export-modal-actions { display: flex; gap: 8px; }


  .powered { text-align: center; padding: 10px; font-size: 10px; color: var(--ink3); border-top: 1px solid var(--rule); flex-shrink: 0; }
  .powered a { color: var(--ink3); text-decoration: none; }
  .powered a:hover { color: var(--blue); }

  /* ── FADE IN ── */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.3s ease both; }
  .fade-up:nth-child(2) { animation-delay: 0.05s; }
  .fade-up:nth-child(3) { animation-delay: 0.10s; }
  .fade-up:nth-child(4) { animation-delay: 0.15s; }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .method-grid { grid-template-columns: repeat(3, 1fr); }
    th.hide-mobile, td.hide-mobile { display: none; }
  }

  /* ── COMPANY SWITCHER ── */
  .co-switcher { position: relative; margin-left: auto; }
  .co-pill {
    display: flex; align-items: center; gap: 7px; cursor: pointer;
    padding: 6px 10px 6px 8px; border-radius: 20px;
    border: 1px solid var(--rule); background: var(--paper2);
    font-size: 12px; font-weight: 600; color: var(--ink2);
    transition: all 0.15s; user-select: none;
  }
  .co-pill:hover { border-color: var(--blue); background: var(--blue-lt); color: var(--blue); }
  .co-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .co-chevron { font-size: 9px; color: var(--ink3); margin-left: 2px; transition: transform 0.2s; }
  .co-chevron.open { transform: rotate(180deg); }
  .co-dropdown {
    position: absolute; right: 0; top: calc(100% + 8px);
    background: var(--paper); border: 1px solid var(--rule); border-radius: 14px;
    box-shadow: var(--shadow-lg); min-width: 240px; z-index: 100;
    overflow: hidden; display: none;
    animation: dropIn 0.15s ease;
  }
  @keyframes dropIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .co-dropdown.open { display: block; }
  .co-dropdown-label { padding: 10px 14px 6px; font-size: 10px; font-weight: 700; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.08em; }
  .co-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer; transition: background 0.12s;
    border-radius: 0;
  }
  .co-item:hover { background: var(--paper2); }
  .co-item.active { background: var(--blue-lt); }
  .co-item-info { flex: 1; min-width: 0; }
  .co-item-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .co-item-meta { font-size: 11px; color: var(--ink3); }
  .co-item-check { color: var(--blue); font-size: 14px; font-weight: 700; }
  .co-default-tag { font-size: 9px; font-weight: 700; color: var(--blue); background: var(--blue-mid); padding: 1px 6px; border-radius: 4px; margin-left: 4px; }
  .co-divider { height: 1px; background: var(--rule); margin: 4px 0; }
  .co-add-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer; transition: background 0.12s;
    color: var(--blue); font-size: 13px; font-weight: 600;
  }
  .co-add-btn:hover { background: var(--blue-lt); }
  .co-add-form { padding: 10px 14px 14px; display: none; flex-direction: column; gap: 8px; }
  .co-add-form.open { display: flex; }
  .co-add-input {
    width: 100%; padding: 8px 10px; border-radius: 8px;
    border: 1px solid var(--rule); background: var(--paper2);
    font-size: 13px; color: var(--ink); font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  .co-add-input:focus { border-color: var(--blue); background: var(--blue-lt); }
  .co-color-row { display: flex; gap: 6px; }
  .co-color-swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.12s; }
  .co-color-swatch.selected { border-color: var(--ink2); }
  .co-add-actions { display: flex; gap: 6px; }
  .co-save-btn { flex: 1; padding: 8px; border-radius: 7px; border: none; background: var(--blue); color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .co-cancel-btn { padding: 8px 12px; border-radius: 7px; border: 1px solid var(--rule); background: transparent; color: var(--ink3); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .co-set-default { font-size: 10px; color: var(--blue); cursor: pointer; text-align: center; padding: 6px; }
  .co-set-default:hover { text-decoration: underline; }


  /* Mobile only */
  .show-mobile-only { display: block; }
  @media (min-width: 768px) { .show-mobile-only { display: none !important; } }

  /* ── DESKTOP LAYOUT ── */
  @media (min-width: 768px) {
    body { overflow: auto; }
    #app { 
      max-width: 100%; 
      flex-direction: row; 
      height: 100vh;
      box-shadow: none;
    }
    /* Left sidebar */
    #app-sidebar {
      width: 260px;
      min-width: 260px;
      border-right: 1px solid var(--rule);
      display: flex;
      flex-direction: column;
      background: var(--paper);
      height: 100vh;
      position: sticky;
      top: 0;
    }
    #app-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100vh;
      overflow: hidden;
    }
    /* Hide mobile header/tabs in desktop - shown in sidebar */
    #mobile-header { display: none; }
    #mobile-tabs { display: none; }
    #desktop-sidebar-content { display: flex; flex-direction: column; height: 100%; }
    
    /* Desktop main area splits when receipt selected */
    #main-split {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #main-content {
      flex: 1;
      overflow-y: auto;
      min-width: 0;
    }
    #receipt-detail-panel {
      width: 380px;
      min-width: 380px;
      border-left: 1px solid var(--rule);
      background: var(--paper);
      overflow-y: auto;
      display: none;
    }
    #receipt-detail-panel.open {
      display: block;
    }
    .stats-row { grid-template-columns: repeat(4, 1fr); }
    th.hide-mobile, td.hide-mobile { display: table-cell; }
  }

  @media (max-width: 767px) {
    #app-sidebar { display: none; }
    #desktop-sidebar-content { display: none; }
    #receipt-detail-panel { display: none !important; }

<script>

// Anon key is a public client key (safe for client-side use — RLS enforces access)

const SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY__ || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhcmdxbGRob256cGFqc2ZtZ3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODkwODEsImV4cCI6MjA5MDM2NTA4MX0.OQmpfmqZMPuIDZ2c0Udy5biIeL6CsAnRh7zcliEGOVo';

  document.body.innerHTML = '<div style="padding:40px;text-align:center;font-family:sans-serif;"><h2>Failed to load Supabase</h2><p>The Supabase library could not be loaded. Check your browser extensions (ad blockers) or network connection.</p><button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;font-size:14px;cursor:pointer;">Retry</button></div>';
  throw new Error('Supabase CDN script not loaded');

// ── COMPANY COLORS ──
const CO_COLORS = ['#1d6fbf','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#db2777','#65a30d'];

// ── CATEGORIES ──
const RV_CATEGORIES = [
  'Fuel & Oil', 'Parts & Repairs', 'Equipment', 'Supplies & Materials',
  'Subcontractors', 'Labor', 'Meals & Entertainment', 'Office & Admin',
  'Travel', 'Utilities', 'Insurance', 'Cost of Goods Sold', 'Other'
];

// ── SUPABASE PERSISTENCE ──
async function saveReceipt(receipt) {
  if (!currentUser) return;
  const row = {
    id: receipt.id.length > 30 ? receipt.id : undefined,
    user_id: currentUser.id,
    merchant: receipt.vendor || null,
    amount: receipt.amount || 0,
    receipt_date: convertToISO(receipt.date) || new Date().toISOString().slice(0, 10),
    notes: receipt.note || null,
    image_url: receipt.imageUrl || null,
    payment_method: receipt.method || null,
    is_business_expense: true,
    business_id: receipt.businessId || null,
    ocr_raw: { name: receipt.name, employee: receipt.employee, time: receipt.time, status: receipt.status, confidence: receipt.confidence, method: receipt.method, card_last4: receipt.cardLast4 || null, card_network: receipt.cardNetwork || null }
  };
  // Look up or create category
  const catId = await getOrCreateCategory(receipt.category);
  if (catId) row.category_id = catId;

  const { data, error } = await sb.from('rv_receipts').upsert(row, { onConflict: 'id' }).select().single();
  if (error) { console.error('Save receipt error:', error); return null; }
  return data;
}

async function getOrCreateCategory(name) {
  if (!name || !currentUser) return null;
  const { data: existing } = await sb.from('rv_categories').select('id').eq('user_id', currentUser.id).eq('name', name).single();
  if (existing) return existing.id;
  const { data: created } = await sb.from('rv_categories').insert({ user_id: currentUser.id, name }).select('id').single();
  return created?.id || null;
}

function convertToISO(dateStr) {
  if (!dateStr) return null;
  // Handle MM-DD-YY format
  const parts = dateStr.split(/[-/]/);
  if (parts.length === 3) {
    let [m, d, y] = parts;
    if (y.length === 2) y = '20' + y;
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  return dateStr;
}

function formatDateFromISO(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr + 'T00:00:00');
  return [String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0'), String(d.getFullYear()).slice(2)].join('-');
}

async function loadReceipts() {
  if (!currentUser) return [];
  const query = sb.from('rv_receipts')
    .select('*, rv_categories(name), businesses(id, name)')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });
  // Filter by active business if one is selected
  if (RV.activeBusinessId) query.eq('business_id', RV.activeBusinessId);
  const { data, error } = await query;
  if (error) { console.error('Load receipts error:', error); return []; }
  return (data || []).map(r => ({
    id: r.id,
    name: r.ocr_raw?.name || formatReceiptName(r.merchant, formatDateFromISO(r.receipt_date), r.amount),
    vendor: r.merchant || '',
    date: formatDateFromISO(r.receipt_date),
    amount: parseFloat(r.amount) || 0,
    category: r.rv_categories?.name || 'Other',
    time: r.ocr_raw?.time || '',
    employee: r.ocr_raw?.employee || currentUser.email,
    status: r.ocr_raw?.status || 'pending',
    method: r.ocr_raw?.method || r.payment_method || 'upload',
    confidence: r.ocr_raw?.confidence || 0,
    note: r.notes || '',
    imageUrl: r.image_url || null,
    businessId: r.business_id || null,
    businessName: r.businesses?.name || null,
    cardLast4: r.ocr_raw?.card_last4 || null,
    cardNetwork: r.ocr_raw?.card_network || null,
    _supabaseId: r.id
  }));
}

async function deleteReceiptFromDB(id) {
  await sb.from('rv_receipts').delete().eq('id', id);
}

async function uploadReceiptImage(file, receiptId) {
  if (!currentUser) return null;
  const ext = file.name.split('.').pop();
  const path = `${currentUser.id}/${receiptId}.${ext}`;
  const { error } = await sb.storage.from('receipt-images').upload(path, file, { upsert: true });
  if (error) { console.error('Upload error:', error); return null; }
  const { data } = sb.storage.from('receipt-images').getPublicUrl(path);
  return data?.publicUrl || null;
}

// ── BUSINESS CRUD (Supabase) ──
async function loadBusinesses() {
  if (!currentUser) return [];
  const { data, error } = await sb.from('businesses').select('*').eq('owner_user_id', currentUser.id).order('created_at');
  if (error) { console.error('Load businesses error:', error); return []; }
  return data || [];
}

async function createBusiness(name, color) {
  if (!currentUser) return null;
  const isFirst = RV.businesses.length === 0;
  const { data, error } = await sb.from('businesses').insert({ owner_user_id: currentUser.id, name, color: color || '#1d6fbf', is_default: isFirst }).select().single();
  if (error) { console.error('Create business error:', error); return null; }
  return data;
}

async function setDefaultBusiness(id) {
  if (!currentUser) return;
  // Unset all defaults first
  await sb.from('businesses').update({ is_default: false }).eq('owner_user_id', currentUser.id);
  await sb.from('businesses').update({ is_default: true }).eq('id', id);
}

// ── CARD MAPPING & AUTO-ROUTING ──
async function loadCardMappings() {
  if (!currentUser) return [];
  const { data } = await sb.from('rv_card_mappings').select('*, businesses(id, name)').eq('user_id', currentUser.id);
  return data || [];
}

async function findBusinessByCard(last4, network) {
  if (!currentUser || !last4) return null;
  let query = sb.from('rv_card_mappings').select('business_id, businesses(id, name)').eq('user_id', currentUser.id).eq('last_four', last4);
  if (network) query = query.eq('network', network);
  const { data } = await query.limit(1).single();
  return data ? { id: data.business_id, name: data.businesses?.name } : null;
}

async function saveCardMapping(last4, network, businessId, bankName, nickname) {
  if (!currentUser || !last4 || !businessId) return;
  await sb.from('rv_card_mappings').upsert({
    user_id: currentUser.id, business_id: businessId, last_four: last4,
    network: network || null, bank_name: bankName || null, nickname: nickname || null
  }, { onConflict: 'user_id,last_four,network' });
}

async function autoRouteReceipt(receipt) {
  if (!receipt.cardLast4) return null;
  // Try to find existing card mapping
  const match = await findBusinessByCard(receipt.cardLast4, receipt.cardNetwork);
  if (match) return match;
  // No match — return null so caller can prompt user
  return null;
}

function showBusinessPickerForCard(receipt, onPicked) {
  const overlay = document.createElement('div');
  overlay.id = 'biz-picker-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,25,35,0.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;padding:20px;animation:fadeIn 0.2s ease;';
  const cardLabel = receipt.cardNetwork ? `${receipt.cardNetwork.toUpperCase()} ****${receipt.cardLast4}` : `****${receipt.cardLast4}`;
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:20px 20px 16px 16px;width:100%;max-width:500px;padding:24px;box-shadow:0 16px 40px rgba(0,0,0,0.3);animation:slideUp 0.25s cubic-bezier(0.16,1,0.3,1);">
      <div style="font-size:16px;font-weight:700;color:var(--ink);margin-bottom:4px;">Assign Card to Business</div>
      <div style="font-size:12px;color:var(--ink3);margin-bottom:16px;line-height:1.6;">
        Card <strong>${cardLabel}</strong> isn't mapped to a business yet.<br>Pick one below — this card will auto-route to it from now on.
      </div>
      <div id="biz-picker-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px;">
        ${RV.businesses.map(b => `
          <div onclick="document.getElementById('biz-picker-overlay')._pick('${b.id}')" style="display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--rule);border-radius:10px;cursor:pointer;transition:all 0.12s;">
            <div style="width:10px;height:10px;border-radius:50%;background:${b.color};flex-shrink:0;"></div>
            <span style="font-size:14px;font-weight:600;color:var(--ink);">${b.name}</span>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="document.getElementById('biz-picker-overlay')._pick(null)" style="flex:1;padding:12px;border-radius:9px;border:1px solid var(--rule);background:var(--paper2);color:var(--ink3);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Skip</button>
      </div>
    </div>`;
  overlay._pick = async (bizId) => {
    overlay.remove();
    if (bizId && receipt.cardLast4) {
      await saveCardMapping(receipt.cardLast4, receipt.cardNetwork, bizId);
    }
    onPicked(bizId);
  };
  document.body.appendChild(overlay);
}

function saveState() {
  // No-op — saves happen per-receipt to Supabase

async function loadState() {
  // Load businesses from Supabase
  const businesses = await loadBusinesses();
  RV.businesses = businesses;
  if (businesses.length > 0) {
    const def = businesses.find(b => b.is_default) || businesses[0];
    if (!RV.activeBusinessId) RV.activeBusinessId = def.id;
  }
  // Load receipts (filtered by active business if set)
  const receipts = await loadReceipts();
  RV.receipts = receipts;
  return true;
}

function buildBusinessListHTML() {

  </div>`;
  html += RV.businesses.map(b => {
    const isActive = b.id === RV.activeBusinessId;
    return `
    <div class="co-item ${isActive ? 'active' : ''}" onclick="switchCompany('${b.id}')" style="position:relative;">
      <div class="co-dot" style="background:${b.color};width:10px;height:10px;border-radius:50%;flex-shrink:0;"></div>
      <div class="co-item-info" style="flex:1;min-width:0;">
        <div class="co-item-name">${b.name}${b.is_default ? '<span class="co-default-tag">DEFAULT</span>' : ''}</div>
      </div>
      ${isActive ? '<span class="co-item-check">✓</span>' : ''}
      <span onclick="event.stopPropagation();showBizActions('${b.id}')" style="cursor:pointer;font-size:14px;padding:2px 6px;color:var(--ink3);border-radius:4px;" title="Edit">···</span>

    ${isActive && !b.is_default ? `<div class="co-set-default" onclick="event.stopPropagation();rvSetDefaultBiz('${b.id}')">Set as default</div>` : ''}`;

  return html;
}

function renderCompanyList() {
  const html = buildBusinessListHTML();
  ['co-list', 'co-list-desktop'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = html;
  });
  ['co-add-trigger', 'co-add-trigger-desktop'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = RV.businesses.length >= 10 ? 'none' : 'flex';
  });
}

function renderColorRow() {
  ['co-color-row', 'co-color-row-desktop'].forEach(id => {
    const row = document.getElementById(id);
    if (!row) return;
    row.innerHTML = CO_COLORS.map(c =>
      `<div class="co-color-swatch ${c === selectedColor ? 'selected' : ''}" style="background:${c};" onclick="selectColor('${c}')"></div>`
    ).join('');
  });
}

function selectColor(color) {
  selectedColor = color;
  document.querySelectorAll('.co-color-swatch').forEach(s => {
    s.classList.toggle('selected', s.style.background === color);
  });
}

function toggleSwitcher(e, variant) {
  e.stopPropagation();
  RV.switcherOpen = !RV.switcherOpen;
  const suffix = variant === 'desktop' ? '-desktop' : '';
  // Close the other panel
  const otherSuffix = suffix === '-desktop' ? '' : '-desktop';
  const otherDD = document.getElementById('co-dropdown' + otherSuffix);
  if (otherDD) otherDD.classList.remove('open');
  const dd = document.getElementById('co-dropdown' + suffix);
  const ch = document.getElementById('co-chevron' + suffix);
  if (dd) dd.classList.toggle('open', RV.switcherOpen);
  if (ch) ch.classList.toggle('open', RV.switcherOpen);
  if (RV.switcherOpen) { renderCompanyList(); renderColorRow(); }
}

function closeSwitcher() {
  RV.switcherOpen = false;
  RV.addFormOpen = false;
  ['', '-desktop'].forEach(suffix => {
    const dd = document.getElementById('co-dropdown' + suffix);
    const ch = document.getElementById('co-chevron' + suffix);
    const af = document.getElementById('co-add-form' + suffix);
    if (dd) dd.classList.remove('open');
    if (ch) ch.classList.remove('open');
    if (af) af.classList.remove('open');
  });
}

async function switchCompany(id) {
  RV.activeBusinessId = id;
  closeSwitcher();
  updatePill();
  await loadState();
  render();
}

async function rvSetDefaultBiz(id) {
  await setDefaultBusiness(id);
  RV.businesses.forEach(b => b.is_default = (b.id === id));
  renderCompanyList();
}

function toggleAddForm(variant) {
  RV.addFormOpen = !RV.addFormOpen;
  const suffix = variant === 'desktop' ? '-desktop' : '';
  const form = document.getElementById('co-add-form' + suffix);
  if (form) form.classList.toggle('open', RV.addFormOpen);
  if (RV.addFormOpen) {
    document.getElementById('co-add-name' + suffix)?.focus();
    renderColorRow();
  }
}

async function addCompany(variant) {
  const suffix = variant === 'desktop' ? '-desktop' : '';
  const input = document.getElementById('co-add-name' + suffix);
  const name = input?.value.trim();
  if (!name) { input?.focus(); return; }
  if (RV.businesses.length >= 10) return;
  const biz = await createBusiness(name, selectedColor);
  if (!biz) return;
  RV.businesses.push(biz);
  RV.activeBusinessId = biz.id;
  selectedColor = CO_COLORS[RV.businesses.length % CO_COLORS.length];
  if (input) input.value = '';
  closeSwitcher();
  updatePill();
  await loadState();
  render();
}

// ── BUSINESS ACTIONS (rename, delete) ──

    <div style="background:#fff;border-radius:20px 20px 16px 16px;width:100%;max-width:400px;padding:24px;box-shadow:0 16px 40px rgba(0,0,0,0.3);animation:slideUp 0.25s cubic-bezier(0.16,1,0.3,1);">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
        <div style="width:12px;height:12px;border-radius:50%;background:${biz.color};"></div>
        <div style="font-size:16px;font-weight:700;color:var(--ink);">Edit Business</div>
      </div>
      <div style="margin-bottom:14px;">

        <input id="biz-edit-name" value="${biz.name.replace(/"/g,'&quot;')}" maxlength="40"
          style="width:100%;padding:11px 13px;border:1.5px solid var(--rule);border-radius:9px;font-size:14px;color:var(--ink);background:var(--paper2);font-family:'DM Sans',sans-serif;outline:none;"
          onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--rule)'">
      </div>
      <div style="margin-bottom:18px;">
        <label style="display:block;font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;">Color</label>
        <div style="display:flex;gap:6px;" id="biz-edit-colors">
          ${CO_COLORS.map(c => `<div class="co-color-swatch ${c === biz.color ? 'selected' : ''}" style="background:${c};" onclick="document.querySelectorAll('#biz-edit-colors .co-color-swatch').forEach(s=>s.classList.remove('selected'));this.classList.add('selected');"></div>`).join('')}
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        ${RV.businesses.length > 1 ? `<button onclick="rvDeleteBusiness('${biz.id}')" style="padding:11px 14px;border-radius:9px;border:1px solid #fecaca;background:#fef2f2;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Delete</button>` : ''}
        <button onclick="document.getElementById('biz-actions-overlay').remove()" style="flex:1;padding:11px;border-radius:9px;border:1px solid var(--rule);background:var(--paper2);color:var(--ink3);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Cancel</button>
        <button onclick="rvSaveBusiness('${biz.id}')" style="flex:2;padding:11px;border-radius:9px;border:none;background:var(--blue);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Save</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('biz-edit-name')?.select(), 100);
}

async function rvSaveBusiness(bizId) {
  const name = document.getElementById('biz-edit-name')?.value.trim();
  if (!name) return;
  const selectedSwatch = document.querySelector('#biz-edit-colors .co-color-swatch.selected');
  const color = selectedSwatch?.style.background || '#1d6fbf';
  const { error } = await sb.from('businesses').update({ name, color }).eq('id', bizId);
  if (error) { console.error('Update business error:', error); return; }
  const biz = RV.businesses.find(b => b.id === bizId);
  if (biz) { biz.name = name; biz.color = color; }
  document.getElementById('biz-actions-overlay')?.remove();
  updatePill();
  renderCompanyList();
  renderSidebarReceipts();
}

async function rvDeleteBusiness(bizId) {
  if (RV.businesses.length <= 1) return;
  const biz = RV.businesses.find(b => b.id === bizId);
  if (!confirm(`Delete "${biz?.name}"? Receipts will be unassigned, not deleted.`)) return;
  const { error } = await sb.from('businesses').delete().eq('id', bizId);
  if (error) { console.error('Delete business error:', error); return; }
  RV.businesses = RV.businesses.filter(b => b.id !== bizId);
  if (RV.activeBusinessId === bizId) {
    const def = RV.businesses.find(b => b.is_default) || RV.businesses[0];
    RV.activeBusinessId = def?.id || null;
  }
  document.getElementById('biz-actions-overlay')?.remove();
  closeSwitcher();
  updatePill();
  await loadState();
  render();
}

function switchTab(tab) {
  RV.tab = tab;
  // Mobile tabs
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['capture','receipts','summary'][i] === tab);
  });
  // Desktop sidebar nav
  ['capture','receipts','summary'].forEach(t => {
    const el = document.getElementById('snav-' + t);
    if (el) el.classList.toggle('active', t === tab);
  });
  render();
  renderSidebarReceipts();
}

function render() {
  const el = document.getElementById('main-content');
  if (!el) return;
  el.innerHTML = ''; // always clear first
  if (RV.tab === 'capture')       el.innerHTML = renderCapture();
  else if (RV.tab === 'receipts') el.innerHTML = renderReceipts();
  else if (RV.tab === 'summary')  el.innerHTML = renderSummary();
  // Sync tab highlight with state
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['capture','receipts','summary'][i] === RV.tab);
  });

  // Set camera capture on mobile after render
  if (RV.tab === 'capture' && isMobile) {
    const camInput = document.getElementById('camera-input');
    if (camInput) camInput.setAttribute('capture', 'environment');
  }

  // Update pending badges (mobile + desktop)
  const pending = activeReceipts().filter(r => r.status === 'pending').length;
  const badge = document.getElementById('pending-badge');

  if (badgeD) { badgeD.textContent = pending; badgeD.style.display = pending ? 'inline-block' : 'none'; }

  const list = document.getElementById('sidebar-receipt-list');

function renderSummary() {
  const summaryReceipts = activeReceipts();
  const total = summaryReceipts.reduce((s,r) => s + r.amount, 0);
  const cats = {};
  summaryReceipts.forEach(r => { cats[r.category] = (cats[r.category]||0) + r.amount; });
  const catSorted = Object.entries(cats).sort((a,b) => b[1]-a[1]);
  const methods = {};
  summaryReceipts.forEach(r => { methods[r.method] = (methods[r.method]||0) + 1; });

  return `<div class="panel-wrap">
    <div class="receipt-table-wrap fade-up">
      <div class="table-header">
        <div class="table-title">Spending by Category</div>
        <div class="table-count">March 2026</div>
      </div>
      <div style="padding:16px;display:flex;flex-direction:column;gap:10px;">
        ${catSorted.map(([cat, amt]) => {

// ── RECEIPT AI EXTRACTION ──
function formatReceiptName(vendor, date, amount) {
  const v = (vendor || 'Unknown').replace(/\s+/g, '');
  const d = date || new Date().toLocaleDateString('en-US', { month:'2-digit', day:'2-digit', year:'2-digit' }).replace(/\//g, '-');
  const a = amount != null ? '$' + parseFloat(amount).toFixed(2) : '$0.00';
  return `${v} ${d} ${a}`;
}

async function extractReceiptData(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      const dataUrl = e.target.result;
      const base64 = dataUrl.split(',')[1];
      const mediaType = dataUrl.match(/data:([\w/]+);/)?.[1] || 'image/jpeg';
      const isPDF = file.type === 'application/pdf';
      try {
        const body = {
          model: 'claude-sonnet-4-20250514',
          max_tokens: 300,
          system: `You are a receipt OCR system. Extract key fields from receipt images and PDFs.
Return ONLY valid JSON, no markdown:
{"vendor":"Business name (short)","date":"MM-DD-YY","amount":9.73,"category":"Fuel & Oil|Parts & Repairs|Equipment|Supplies & Materials|Subcontractors|Labor|Meals & Entertainment|Office & Admin|Travel|Utilities|Insurance|Cost of Goods Sold|Other","card_last4":"1234","card_network":"visa|mastercard|amex|discover|other","confidence":0.95}
card_last4 = last 4 digits of the card number shown on receipt. card_network = card network if visible.
If a field is not readable, use null. Amount is total charged as a number.`,
          messages: [{ role: 'user', content: isPDF
            ? [{ type:'document', source:{type:'base64', media_type:'application/pdf', data:base64} }, { type:'text', text:'Extract vendor, date, total amount, and category from this receipt.' }]
            : [{ type:'image', source:{type:'base64', media_type:mediaType, data:base64} }, { type:'text', text:'Extract vendor, date, total amount, and category from this receipt.' }]
          }]
        };
        const response = await fetch('/api/claude', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
        });
        const data = await response.json();
        const raw = data.content?.map(c => c.text || '').join('') || '';
        const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
        resolve({ success: true, ...parsed });
      } catch(err) {
        resolve({ success: false, vendor: null, date: null, amount: null, category: '— review', confidence: 0 });
      }
    };
    reader.readAsDataURL(file);
  });
}

function rvHandleFiles(files, method) {
  if (!files?.length) return;
  const preview = document.getElementById('upload-preview');
  if (!preview) return;
  preview.style.display = 'flex';
  preview.style.flexDirection = 'column';
  preview.style.gap = '8px';

  const items = Array.from(files).map(f => {
    const isImg = f.type.startsWith('image/');
    const isPDF = f.type === 'application/pdf';
    const url = isImg ? URL.createObjectURL(f) : null;
    const id = 'prev-' + Date.now() + Math.random().toString(36).slice(2);
    return { f, url, id, isImg, isPDF };
  });

  preview.innerHTML = items.map(({f, url, id, isPDF}) => `
    <div class="preview-item" id="${id}">
      ${url ? `<img class="preview-thumb" src="${url}" alt="">` : `<div class="preview-thumb-placeholder">${isPDF ? '📄' : '🖼️'}</div>`}
      <div class="preview-info">
        <div class="preview-name" style="font-size:11px;color:var(--ink3);">${f.name}</div>
        <div class="preview-meta">Reading receipt…</div>
      </div>
      <span class="preview-status processing">AI Reading</span>
    </div>`).join('');

  items.forEach(async ({f, url, id}) => {
    const extracted = await extractReceiptData(f);
    const row = document.getElementById(id);
    const today = new Date();
    const fallbackDate = [String(today.getMonth()+1).padStart(2,'0'), String(today.getDate()).padStart(2,'0'), String(today.getFullYear()).slice(2)].join('-');
    const vendor   = extracted.vendor   || f.name.replace(/\.[^.]+$/, '').replace(/[-_]/g,' ').trim();
    const date     = extracted.date     || fallbackDate;
    const amount   = extracted.amount   || 0;
    const category = extracted.category || 'Other';
    const recId    = crypto.randomUUID();
    const recName  = formatReceiptName(vendor, date, amount);
    if (row) {
      const infoEl = row.querySelector('.preview-info');
      const statusEl = row.querySelector('.preview-status');
      if (infoEl) infoEl.innerHTML = `<div class="receipt-name-wrap"><div class="receipt-name-display" id="name-disp-${recId}" onclick="rvEditName('${recId}')">${recName}</div></div><div class="preview-meta">${category} · ${methodLabel[method]||method} <span class="edit-hint">tap to edit</span></div>`;
      if (statusEl) { statusEl.textContent = extracted.success ? 'Saving…' : 'Saving…'; statusEl.className = 'preview-status processing'; }
    }
    // Upload image to Supabase Storage
    let imageUrl = null;
    if (f.type.startsWith('image/')) {
      imageUrl = await uploadReceiptImage(f, recId);
    }
    const cardLast4 = extracted.card_last4 || null;
    const cardNetwork = extracted.card_network || null;
    // Auto-route by card mapping
    let businessId = RV.activeBusinessId;
    if (cardLast4) {
      const match = await autoRouteReceipt({ cardLast4, cardNetwork });
      if (match) {
        businessId = match.id;
      } else if (RV.businesses.length > 1) {
        // No mapping found — prompt user (async, non-blocking for other files)
        businessId = await new Promise(resolve => {
          showBusinessPickerForCard({ cardLast4, cardNetwork }, (pickedId) => resolve(pickedId || RV.activeBusinessId));
        });
      }
    }
    const receipt = { id:recId, name:recName, vendor, date, amount, category, time:today.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}), employee:currentUser?.email || 'Current User', status:'pending', method, confidence:extracted.confidence||0, note:extracted.success?'':'Low confidence — verify details', imageUrl, businessId, cardLast4, cardNetwork };
    // Save to Supabase
    const saved = await saveReceipt(receipt);
    if (saved) receipt.id = saved.id;
    RV.receipts.unshift(receipt);
    // Update UI
    if (row) {
      const statusEl = row.querySelector('.preview-status');
      if (statusEl) { statusEl.textContent = extracted.success ? 'Saved ✓' : 'Saved*'; statusEl.className = 'preview-status ' + (extracted.success ? 'done' : 'error'); }
    }
    const pendingCount = RV.receipts.filter(r => r.status === 'pending').length;
    const badge = document.getElementById('pending-badge');
    if (badge) { badge.textContent = pendingCount; badge.style.display = 'inline-block'; }
    renderSidebarReceipts();
  });
}

function rvEditName(recId) {
  const disp = document.getElementById('name-disp-' + recId);

  const current = disp.textContent;
  const wrap = disp.parentElement;
  wrap.innerHTML = `<input class="receipt-name-input" id="name-inp-${recId}" value="${current}" onblur="rvSaveName('${recId}',this.value)" onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.value='${current}';this.blur();}">`;
  document.getElementById('name-inp-' + recId)?.select();
}

async function rvSaveName(recId, newName) {
  const trimmed = newName.trim() || 'Unknown Receipt';
  const r = RV.receipts.find(r => String(r.id) === String(recId));
  if (r) { r.name = trimmed; await saveReceipt(r); }
  const wrap = document.querySelector(`[id="name-inp-${recId}"]`)?.parentElement;
  if (wrap) wrap.innerHTML = `<div class="receipt-name-display" id="name-disp-${recId}" onclick="rvEditName('${recId}')">${trimmed}</div>`;
}

function rvDownloadCSV() {
  const selected = rvGetSelected();
  const receipts = selected.length > 0 ? selected : activeReceipts();
  const co = activeBusiness();

  const headers = ['Receipt Name','Vendor','Date','Time','Amount','Category','Status','Method','Employee','Note'];
  const rows = receipts.map(r => [
    r.name || formatReceiptName(r.vendor, r.date, r.amount),
    r.vendor || '',
    r.date || '',
    r.time || '',
    (r.amount || 0).toFixed(2),
    r.category || '',
    r.status || '',
    methodLabel[r.method] || r.method || '',
    r.employee || '',
    r.note || ''
  ].map(v => `"${String(v).replace(/"/g,'""')}"`));

  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'2-digit'}).replace(/\//g,'-');
  a.href = url;
  a.download = `${co.name.replace(/\s+/g,'_')}_Receipts_${dateStr}.csv`;
  a.click();
  URL.revokeObjectURL(url);

  // Confirm download
  const btn = document.querySelector('#export-overlay .export-btn.primary');
  if (btn) { btn.textContent = '✓ Downloaded!'; btn.style.background = 'var(--green)'; setTimeout(() => { btn.textContent = '⬇ Download CSV'; btn.style.background = ''; }, 2500); }
}

function rvSendExport() {
  const email = document.getElementById('export-email')?.value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('export-email')?.focus();
    document.getElementById('export-email').style.borderColor = 'var(--red)';
    setTimeout(() => { const el = document.getElementById('export-email'); if(el) el.style.borderColor = ''; }, 1500);
    return;
  }
  // For now — download CSV and open mailto as a bridge until backend is ready
  rvDownloadCSV();
  const selected = rvGetSelected();
  const receipts = selected.length > 0 ? selected : activeReceipts();
  const co = activeBusiness();
  const note = document.getElementById('export-note')?.value.trim() || '';
  const total = receipts.reduce((s,r) => s + (r.amount||0), 0);
  const subject = encodeURIComponent(`${co.name} Receipts — ${receipts.length} records, $${total.toFixed(2)}`);
  const body = encodeURIComponent(
    `Hi,\n\nPlease find attached the receipt export from ReceiptVault.\n\n` +
    `Company: ${co.name}\nReceipts: ${receipts.length}\nTotal: $${total.toFixed(2)}\n` +
    (note ? `\nNote: ${note}\n` : '') +
    `\nThe CSV file has been downloaded to your device — please attach it to this email before sending.\n\n` +
    `Receipt summary:\n` +
    receipts.map(r => `• ${r.name || formatReceiptName(r.vendor,r.date,r.amount)} — $${(r.amount||0).toFixed(2)}`).join('\n')
  );
  window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
  setTimeout(rvCloseExport, 500);
}

      <div class="detail-field" style="border-bottom:none;">
        <div class="detail-field-label">Amount</div>
        <input class="detail-field-input" id="detail-amount-${r.id}" value="${(r.amount||0).toFixed(2)}" type="number" step="0.01" onblur="rvDetailSave('${r.id}')">
      </div>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">Category</div>
      <select class="detail-field-select" id="detail-cat-${r.id}" onchange="rvDetailSave('${r.id}')">
        ${catOptions}
      </select>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">Status</div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <span class="badge ${r.status}">${r.status === 'synced' ? '✓ Synced' : '⏳ Pending Review'}</span>
        ${r.status === 'pending' ? `<button onclick="rvApprove('${r.id}')" style="padding:3px 10px;border-radius:5px;border:1px solid var(--blue);background:transparent;color:var(--blue);cursor:pointer;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;">Approve →</button>` : ''}
      </div>
    </div>
    ${r.note ? `<div class="detail-field"><div class="detail-field-label">Note</div><div style="font-size:12px;color:var(--ink3);">${r.note}</div></div>` : ''}
    <div class="detail-actions">
      <button onclick="rvDeleteReceipt('${r.id}')" style="padding:10px 14px;border-radius:8px;border:1px solid #fecaca;background:#fef2f2;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Delete</button>
      <button onclick="closeReceiptDetail()" style="flex:1;padding:10px 14px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Done</button>
    </div>`;
}

function closeReceiptDetail() {
  RV.selectedReceiptId = null;
  document.getElementById('receipt-modal-overlay')?.remove();
  const panel = document.getElementById('receipt-detail-panel');
  if (panel) { panel.classList.remove('open'); panel.innerHTML = ''; }
  renderSidebarReceipts();
}

async function rvDetailSave(id) {
  const r = activeReceipts().find(r => String(r.id) === String(id));
  if (!r) return;
  const name = document.getElementById('detail-name-' + id)?.value.trim();
  const vendor = document.getElementById('detail-vendor-' + id)?.value.trim();
  const date = document.getElementById('detail-date-' + id)?.value.trim();
  const amount = parseFloat(document.getElementById('detail-amount-' + id)?.value) || 0;
  const cat = document.getElementById('detail-cat-' + id)?.value;
  if (name) r.name = name;
  if (vendor) r.vendor = vendor;
  if (date) r.date = date;
  r.amount = amount;
  if (cat) r.category = cat;
  await saveReceipt(r);
  render();
}

async function rvDeleteReceipt(id) {
  if (!confirm('Delete this receipt?')) return;
  await deleteReceiptFromDB(id);
  RV.receipts = RV.receipts.filter(r => String(r.id) !== String(id));
  closeReceiptDetail();
  render();
}

function rvZoomImage(url) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';
  overlay.onclick = () => overlay.remove();
  overlay.innerHTML = `<img src="${url}" style="max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px;">`;
  document.body.appendChild(overlay);
}

// ── EMAIL RECEIPTS (mobile) ──
function rvBuildCSV(receipts) {
  const headers = ['Date','Vendor','Amount','Category','Status','Method','Employee','Note'];
  const rows = receipts.map(r => [
    r.date || '',
    (r.vendor || r.name || '').replace(/,/g, ' '),
    (r.amount || 0).toFixed(2),
    (r.category || '').replace(/,/g, ' '),
    r.status || '',
    r.method || '',
    (r.employee || '').replace(/,/g, ' '),
    (r.note || '').replace(/,/g, ' ')
  ]);
  const total = receipts.reduce((s, r) => s + (r.amount || 0), 0);
  rows.push(['', 'TOTAL', total.toFixed(2), '', '', '', '', '']);
  return [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
}

function rvDownloadCSV() {
  const co = activeBusiness();
  const receipts = RV.receipts || [];
  if (!receipts.length) { alert('No receipts to export.'); return; }
  const csv = rvBuildCSV(receipts);
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${co.name.replace(/\s+/g,'-')}-Receipts-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function rvEmailReceipts() {
  const co = activeBusiness();
  const receipts = RV.receipts || [];
  if (!receipts.length) { alert('No receipts to send.'); return; }

  // Step 1: Download the CSV automatically
  rvDownloadCSV();

  // Step 2: Get or prompt for email address
  let toAddr = co.emailOut || '';
  if (!toAddr) {
    toAddr = prompt('Enter email address to send receipts to:');
    if (!toAddr) return;
    co.emailOut = toAddr;
    saveState();
  }

  // Step 3: Open mail app with instructions to attach the CSV
  const total = receipts.reduce((s, r) => s + (r.amount || 0), 0);
  const pending = receipts.filter(r => r.status === 'pending').length;
  const synced = receipts.filter(r => r.status === 'synced').length;
  const subject = encodeURIComponent(`${co.name} Receipts — ${new Date().toLocaleDateString()}`);
  const body = encodeURIComponent(
    `${co.name} — Receipt Export\n` +
    `Generated: ${new Date().toLocaleString()}\n\n` +
    `Summary:\n` +
    `  Total Receipts: ${receipts.length}\n` +
    `  Approved/Synced: ${synced}\n` +
    `  Pending Review: ${pending}\n` +
    `  Total Amount: $${total.toFixed(2)}\n\n` +
    `The CSV file has been downloaded to your device.\n` +
    `Please attach it to this email before sending.\n\n` +
    `Sent from ReceiptVault by WEG Consulting`
  );

  setTimeout(() => {
    window.location.href = `mailto:${toAddr}?subject=${subject}&body=${body}`;
  }, 500);
}

// ── AUTH UI ──
function showAuthScreen() {
  document.getElementById('app').style.display = 'none';
  let existing = document.getElementById('auth-gate');
  if (existing) existing.remove();
  const gate = document.createElement('div');
  gate.id = 'auth-gate';
  gate.innerHTML = `
    <div style="position:fixed;inset:0;background:var(--ink,#0f1923);display:flex;align-items:center;justify-content:center;padding:24px;z-index:9999;">
      <div style="background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,0.4);animation:gateIn 0.35s cubic-bezier(0.16,1,0.3,1) both;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px;">
          <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#1d6fbf,#1a4fa0);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 12px rgba(29,111,191,0.4);">🧾</div>
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:22px;color:#0f1923;letter-spacing:-0.02em;">Receipt<span style="color:#1d6fbf;">Vault</span></div>
            <div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:0.1em;margin-top:2px;">by WEG Consulting</div>
          </div>
        </div>
        <div id="auth-title" style="font-size:20px;font-weight:600;color:#0f1923;margin-bottom:6px;letter-spacing:-0.02em;">Sign In</div>
        <div id="auth-subtitle" style="font-size:13px;color:#64748b;margin-bottom:24px;line-height:1.6;">Enter your email and password to continue.</div>
        <div style="margin-bottom:14px;">
          <label style="display:block;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;">Email</label>
          <input id="auth-email" type="email" placeholder="you@example.com" autocapitalize="none"
            style="width:100%;padding:13px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;color:#0f1923;background:#f8fafc;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none;"
            onkeydown="if(event.key==='Enter')document.getElementById('auth-password').focus()"
            onfocus="this.style.borderColor='#1d6fbf';this.style.boxShadow='0 0 0 3px rgba(29,111,191,0.12)'"
            onblur="this.style.borderColor='#e2e8f0';this.style.boxShadow='none'">
        </div>
        <div style="margin-bottom:14px;">
          <label style="display:block;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;">Password</label>
          <input id="auth-password" type="password" placeholder="Your password"
            style="width:100%;padding:13px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;color:#0f1923;background:#f8fafc;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none;"
            onkeydown="if(event.key==='Enter')submitAuth()"
            onfocus="this.style.borderColor='#1d6fbf';this.style.boxShadow='0 0 0 3px rgba(29,111,191,0.12)'"
            onblur="this.style.borderColor='#e2e8f0';this.style.boxShadow='none'">
        </div>
        <div id="auth-error" style="display:none;background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;"></div>
        <div id="auth-success" style="display:none;background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;"></div>
        <button id="auth-submit-btn" onclick="submitAuth()"
          style="width:100%;padding:14px;background:linear-gradient(135deg,#1d6fbf,#1a5fa8);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 4px 14px rgba(29,111,191,0.35);">
          Sign In
        </button>
        <div style="text-align:center;margin-top:18px;font-size:13px;color:#64748b;">
          <span id="auth-toggle-text">Don't have an account?</span>
          <a href="#" id="auth-toggle-link" onclick="toggleAuthMode(event)" style="color:#1d6fbf;text-decoration:none;font-weight:600;margin-left:4px;">Sign Up</a>
        </div>
      </div>
    </div>
    <style>
      @keyframes gateIn { from { opacity:0; transform:translateY(20px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
    </style>`;
  document.body.appendChild(gate);
  setTimeout(() => document.getElementById('auth-email')?.focus(), 100);
}

let authMode = 'login';
function toggleAuthMode(e) {
  if (e) e.preventDefault();
  authMode = authMode === 'login' ? 'signup' : 'login';
  document.getElementById('auth-title').textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('auth-subtitle').textContent = authMode === 'login' ? 'Enter your email and password to continue.' : 'Create a new account to get started.';
  document.getElementById('auth-submit-btn').textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('auth-toggle-text').textContent = authMode === 'login' ? "Don't have an account?" : 'Already have an account?';
  document.getElementById('auth-toggle-link').textContent = authMode === 'login' ? 'Sign Up' : 'Sign In';
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-success').style.display = 'none';
}

async function submitAuth() {
  const email = document.getElementById('auth-email')?.value.trim();
  const password = document.getElementById('auth-password')?.value;
  const errEl = document.getElementById('auth-error');
  const successEl = document.getElementById('auth-success');
  errEl.style.display = 'none';
  successEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent = 'Please enter both email and password.';
    errEl.style.display = 'block';
    return;
  }
  if (password.length < 6) {
    errEl.textContent = 'Password must be at least 6 characters.';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('auth-submit-btn');
  btn.disabled = true;
  btn.textContent = authMode === 'login' ? 'Signing in…' : 'Creating account…';

  try {
    let result;
    if (authMode === 'signup') {
      result = await sb.auth.signUp({ email, password });
      if (result.error) throw result.error;
      if (result.data?.user?.identities?.length === 0) {
        errEl.textContent = 'An account with this email already exists. Try signing in.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
        return;
      }
      // Check if email confirmation is required
      if (result.data?.user && !result.data.session) {
        successEl.textContent = 'Account created! Check your email to confirm, then sign in.';
        successEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
        authMode = 'login';
        toggleAuthMode();
        return;
      }
    } else {
      result = await sb.auth.signInWithPassword({ email, password });
      if (result.error) throw result.error;
    }
    // Auth succeeded — session is set, onAuthStateChange will handle the rest
  } catch(err) {
    errEl.textContent = err.message || 'Authentication failed. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
  }
}

async function signOut() {
  await sb.auth.signOut();
  currentUser = null;
  showAuthScreen();
}

// ── INIT ──
let initRunning = false;
async function init() {
  if (initRunning) return;
  initRunning = true;
  try {
    await loadState();
    // Auto-create default business if user has none
    if (RV.businesses.length === 0) {
      const biz = await createBusiness('My Business', '#1d6fbf');
      if (biz) {
        RV.businesses.push(biz);
        RV.activeBusinessId = biz.id;
        await loadState();
      }
    }
    render();
    initSwitcher();
  } catch (e) {
    console.error('Init error:', e);
    // Still try to render what we can
    render();
    initSwitcher();
  } finally {
    initRunning = false;
  }
}

// Single auth entry point — onAuthStateChange handles everything including initial session
sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    currentUser = session.user;
    document.getElementById('auth-gate')?.remove();
    document.getElementById('app').style.display = '';
    await init();
  } else {
    currentUser = null;
    showAuthScreen();
  }
});
</script>
