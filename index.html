<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ReceiptVault">
<meta name="theme-color" content="#ffffff">
<meta name="description" content="Capture, organize, and sync business receipts from anywhere. Camera, upload, drag & drop, or email.">
<title>ReceiptVault — Business Receipt Management</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:       #0f1923;
    --ink2:      #2d3d4f;
    --ink3:      #64748b;
    --rule:      #e2e8f0;
    --rule2:     #f1f5f9;
    --paper:     #ffffff;
    --paper2:    #f8fafc;
    --paper3:    #f1f5f9;
    --blue:      #1d6fbf;
    --blue-lt:   #eff6ff;
    --blue-mid:  #dbeafe;
    --green:     #16a34a;
    --green-lt:  #f0fdf4;
    --amber:     #d97706;
    --amber-lt:  #fffbeb;
    --red:       #dc2626;
    --shadow-sm: 0 1px 3px rgba(15,25,35,0.08), 0 1px 2px rgba(15,25,35,0.04);
    --shadow-md: 0 4px 12px rgba(15,25,35,0.08), 0 2px 4px rgba(15,25,35,0.04);
    --shadow-lg: 0 16px 40px rgba(15,25,35,0.10), 0 4px 8px rgba(15,25,35,0.04);
    --radius:    12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body { height: 100%; background: var(--paper2); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; overflow: hidden; }

  /* ── LAYOUT ── */
  #app { display: flex; flex-direction: column; height: 100%; max-width: 600px; margin: 0 auto; background: var(--paper); box-shadow: var(--shadow-lg); position: relative; }

  /* ── HEADER ── */
  header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--rule);
    display: flex; align-items: center; gap: 12px;
    background: var(--paper);
    position: sticky; top: 0; z-index: 10;
    flex-shrink: 0;
  }
  .logo-mark {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--blue) 0%, #1a4fa0 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; box-shadow: 0 2px 8px rgba(29,111,191,0.3);
    flex-shrink: 0;
  }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--ink); letter-spacing: -0.02em; }
  .logo-text span { color: var(--blue); }
  .header-tag { margin-left: auto; font-size: 11px; color: var(--ink3); background: var(--paper3); border: 1px solid var(--rule); padding: 3px 9px; border-radius: 20px; font-weight: 500; letter-spacing: 0.02em; }

  /* ── TABS ── */
  .tabs { display: flex; border-bottom: 1px solid var(--rule); background: var(--paper); flex-shrink: 0; padding: 0 16px; gap: 2px; }
  .tab { padding: 11px 14px; font-size: 13px; font-weight: 500; color: var(--ink3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; white-space: nowrap; }
  .tab:hover { color: var(--ink2); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab-badge { display: inline-block; background: var(--amber); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 10px; margin-left: 5px; vertical-align: middle; }

  /* ── MAIN SCROLL ── */
  main { flex: 1; overflow-y: auto; overscroll-behavior: contain; }
  main::-webkit-scrollbar { width: 4px; }
  main::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }

  /* ── PANELS ── */
  .panel-wrap { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

  /* ── STATS ROW ── */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .stat-card { background: var(--paper); border: 1px solid var(--rule); border-radius: var(--radius); padding: 14px 12px; box-shadow: var(--shadow-sm); }
  .stat-label { font-size: 10px; font-weight: 600; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--ink); line-height: 1; margin-bottom: 2px; font-family: 'DM Mono', monospace; }
  .stat-value.blue  { color: var(--blue); }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }
  .stat-sub { font-size: 10px; color: var(--ink3); }

  /* ── UPLOAD CARD ── */
  .upload-card { background: var(--paper); border: 1px solid var(--rule); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
  .upload-card-header { padding: 14px 16px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; gap: 10px; }
  .upload-card-title { font-size: 13px; font-weight: 600; color: var(--ink); }
  .upload-card-sub { font-size: 11px; color: var(--ink3); margin-top: 1px; }
  .upload-card-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  /* ── DROP ZONE ── */
  .dropzone {
    border: 2px dashed var(--rule); border-radius: 10px;
    padding: 28px 20px; text-align: center;
    background: var(--paper2); cursor: pointer;
    transition: all 0.2s;
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--blue); background: var(--blue-lt);
  }
  .dropzone-icon { font-size: 32px; margin-bottom: 8px; }
  .dropzone-label { font-size: 14px; font-weight: 500; color: var(--ink2); margin-bottom: 3px; }
  .dropzone-sub { font-size: 12px; color: var(--ink3); }
  .dropzone-link { color: var(--blue); font-weight: 500; text-decoration: none; }

  /* ── METHOD BUTTONS ── */
  .method-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .method-btn {
    border: 1px solid var(--rule); border-radius: 10px; padding: 14px 10px;
    text-align: center; background: var(--paper2); cursor: pointer;
    transition: all 0.15s; display: block; text-decoration: none;
  }
  .method-btn:hover { border-color: var(--blue); background: var(--blue-lt); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .method-icon { font-size: 22px; margin-bottom: 6px; }
  .method-label { font-size: 12px; font-weight: 600; color: var(--ink); display: block; margin-bottom: 2px; }
  .method-sub { font-size: 10px; color: var(--ink3); }

  /* ── EMAIL INFO DRAWER ── */
  .email-drawer {
    background: var(--blue-lt); border: 1px solid var(--blue-mid);
    border-radius: 10px; padding: 14px 16px; display: none;
  }
  .email-drawer.open { display: block; }
  .email-address {
    font-family: 'DM Mono', monospace; font-size: 13px;
    background: var(--paper); border: 1px solid var(--blue-mid);
    border-radius: 7px; padding: 10px 12px; color: var(--ink);
    margin: 8px 0; word-break: break-all; cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .email-address:hover { background: var(--blue-mid); }
  .copy-btn { font-size: 11px; color: var(--blue); font-family: 'DM Sans', sans-serif; font-weight: 600; flex-shrink: 0; }

  /* ── UPLOAD PREVIEW ── */
  .upload-preview { display: flex; flex-direction: column; gap: 8px; }
  .preview-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--paper2); border: 1px solid var(--rule);
    border-radius: 9px; padding: 10px 12px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .preview-thumb { width: 44px; height: 44px; border-radius: 7px; object-fit: cover; border: 1px solid var(--rule); flex-shrink: 0; }
  .preview-thumb-placeholder { width: 44px; height: 44px; border-radius: 7px; background: var(--paper3); border: 1px solid var(--rule); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .preview-info { flex: 1; min-width: 0; }
  .preview-name { font-size: 12px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .preview-meta { font-size: 11px; color: var(--ink3); margin-top: 2px; }
  .preview-status { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 5px; flex-shrink: 0; }
  .preview-status.processing { background: var(--amber-lt); color: var(--amber); border: 1px solid #fde68a; }
  .preview-status.done { background: var(--green-lt); color: var(--green); border: 1px solid #bbf7d0; }
  .preview-status.error { background: #fef2f2; color: var(--red); border: 1px solid #fecaca; }

  /* ── RECEIPT NAME INLINE EDIT ── */
  .receipt-name-wrap { display: flex; align-items: center; gap: 4px; }
  .receipt-name-display { font-size: 12px; font-weight: 500; color: var(--ink); cursor: pointer; border-bottom: 1px dashed transparent; transition: border-color 0.15s; }
  .receipt-name-display:hover { border-bottom-color: var(--blue); color: var(--blue); }
  .receipt-name-input {
    font-size: 12px; font-weight: 500; color: var(--ink); border: none;
    border-bottom: 1px solid var(--blue); background: transparent; outline: none;
    font-family: 'DM Sans', sans-serif; width: 100%; padding: 0;
  }
  .edit-hint { font-size: 10px; color: var(--ink3); opacity: 0; transition: opacity 0.2s; }
  .preview-info:hover .edit-hint { opacity: 1; }

  /* ── RECEIPT TABLE ── */
  .receipt-table-wrap { background: var(--paper); border: 1px solid var(--rule); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
  .table-header { padding: 14px 16px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; justify-content: space-between; }
  .table-title { font-size: 13px; font-weight: 600; color: var(--ink); }
  .table-count { font-size: 12px; color: var(--ink3); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--paper2); border-bottom: 1px solid var(--rule); }
  th { padding: 9px 14px; font-size: 10px; font-weight: 700; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.06em; text-align: left; }
  th.right { text-align: right; }
  td { padding: 12px 14px; border-bottom: 1px solid var(--rule); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--paper2); }
  .vendor-name { font-size: 13px; font-weight: 500; color: var(--ink); }
  .vendor-emp { font-size: 11px; color: var(--ink3); margin-top: 1px; }
  .amount { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; color: var(--ink); text-align: right; }
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 5px; }
  .badge.synced  { background: var(--green-lt); color: var(--green); border: 1px solid #bbf7d0; }
  .badge.pending { background: var(--amber-lt); color: var(--amber); border: 1px solid #fde68a; }
  .badge.cat     { background: var(--paper3); color: var(--ink2); border: 1px solid var(--rule); }
  .via-icon { font-size: 14px; cursor: default; }

  /* ── MOBILE BOTTOM NAV ── */
  .bottom-bar {
    border-top: 1px solid var(--rule); padding: 12px 20px;
    background: var(--paper); flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--ink3);
  }
  .bottom-cta {
    background: var(--blue); color: #fff;
    border: none; border-radius: 8px; padding: 9px 16px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    box-shadow: 0 2px 8px rgba(29,111,191,0.3);
    transition: all 0.15s;
  }
  .bottom-cta:hover { background: #1a5fa8; transform: translateY(-1px); }

  /* ── EMPTY STATE ── */
  .empty-state { padding: 60px 30px; text-align: center; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--ink2); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; color: var(--ink3); line-height: 1.6; }

  /* ── POWERED BY ── */
  .powered { text-align: center; padding: 10px; font-size: 10px; color: var(--ink3); border-top: 1px solid var(--rule); flex-shrink: 0; }
  .powered a { color: var(--ink3); text-decoration: none; }
  .powered a:hover { color: var(--blue); }

  /* ── FADE IN ── */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.3s ease both; }
  .fade-up:nth-child(2) { animation-delay: 0.05s; }
  .fade-up:nth-child(3) { animation-delay: 0.10s; }
  .fade-up:nth-child(4) { animation-delay: 0.15s; }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .method-grid { grid-template-columns: repeat(3, 1fr); }
    th.hide-mobile, td.hide-mobile { display: none; }
  }

  /* ── COMPANY SWITCHER ── */
  .co-switcher { position: relative; margin-left: auto; }
  .co-pill {
    display: flex; align-items: center; gap: 7px; cursor: pointer;
    padding: 6px 10px 6px 8px; border-radius: 20px;
    border: 1px solid var(--rule); background: var(--paper2);
    font-size: 12px; font-weight: 600; color: var(--ink2);
    transition: all 0.15s; user-select: none;
  }
  .co-pill:hover { border-color: var(--blue); background: var(--blue-lt); color: var(--blue); }
  .co-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .co-chevron { font-size: 9px; color: var(--ink3); margin-left: 2px; transition: transform 0.2s; }
  .co-chevron.open { transform: rotate(180deg); }
  .co-dropdown {
    position: absolute; right: 0; top: calc(100% + 8px);
    background: var(--paper); border: 1px solid var(--rule); border-radius: 14px;
    box-shadow: var(--shadow-lg); min-width: 240px; z-index: 100;
    overflow: hidden; display: none;
    animation: dropIn 0.15s ease;
  }
  @keyframes dropIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .co-dropdown.open { display: block; }
  .co-dropdown-label { padding: 10px 14px 6px; font-size: 10px; font-weight: 700; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.08em; }
  .co-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer; transition: background 0.12s;
    border-radius: 0;
  }
  .co-item:hover { background: var(--paper2); }
  .co-item.active { background: var(--blue-lt); }
  .co-item-info { flex: 1; min-width: 0; }
  .co-item-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .co-item-meta { font-size: 11px; color: var(--ink3); }
  .co-item-check { color: var(--blue); font-size: 14px; font-weight: 700; }
  .co-default-tag { font-size: 9px; font-weight: 700; color: var(--blue); background: var(--blue-mid); padding: 1px 6px; border-radius: 4px; margin-left: 4px; }
  .co-divider { height: 1px; background: var(--rule); margin: 4px 0; }
  .co-add-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer; transition: background 0.12s;
    color: var(--blue); font-size: 13px; font-weight: 600;
  }
  .co-add-btn:hover { background: var(--blue-lt); }
  .co-add-form { padding: 10px 14px 14px; display: none; flex-direction: column; gap: 8px; }
  .co-add-form.open { display: flex; }
  .co-add-input {
    width: 100%; padding: 8px 10px; border-radius: 8px;
    border: 1px solid var(--rule); background: var(--paper2);
    font-size: 13px; color: var(--ink); font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  .co-add-input:focus { border-color: var(--blue); background: var(--blue-lt); }
  .co-color-row { display: flex; gap: 6px; }
  .co-color-swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.12s; }
  .co-color-swatch.selected { border-color: var(--ink2); }
  .co-add-actions { display: flex; gap: 6px; }
  .co-save-btn { flex: 1; padding: 8px; border-radius: 7px; border: none; background: var(--blue); color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .co-cancel-btn { padding: 8px 12px; border-radius: 7px; border: 1px solid var(--rule); background: transparent; color: var(--ink3); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .co-set-default { font-size: 10px; color: var(--blue); cursor: pointer; text-align: center; padding: 6px; }
  .co-set-default:hover { text-decoration: underline; }

</style>
</head>
<body>
<div id="app" style="display:none">

  <!-- HEADER -->
  <header>
    <div class="logo-mark">🧾</div>
    <div>
      <div class="logo-text">Receipt<span>Vault</span></div>
    </div>
    <div class="co-switcher" id="co-switcher">
      <div class="co-pill" id="co-pill" onclick="toggleSwitcher(event)">
        <div class="co-dot" id="co-dot"></div>
        <span id="co-name-label">Loading…</span>
        <span class="co-chevron" id="co-chevron">▼</span>
      </div>
      <div class="co-dropdown" id="co-dropdown">
        <div class="co-dropdown-label">Your Companies</div>
        <div id="co-list"></div>
        <div class="co-divider"></div>
        <div class="co-add-btn" id="co-add-trigger" onclick="toggleAddForm()">
          <span style="font-size:16px;">＋</span> Add Company
        </div>
        <div class="co-add-form" id="co-add-form">
          <input class="co-add-input" id="co-add-name" placeholder="Company name" maxlength="40">
          <div style="font-size:10px;color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;">Color tag</div>
          <div class="co-color-row" id="co-color-row"></div>
          <div class="co-add-actions">
            <button class="co-cancel-btn" onclick="toggleAddForm()">Cancel</button>
            <button class="co-save-btn" onclick="addCompany()">Add Company</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('capture')">Capture</div>
    <div class="tab" onclick="switchTab('receipts')">Receipts <span class="tab-badge" id="pending-badge" style="display:none"></span></div>
    <div class="tab" onclick="switchTab('summary')">Summary</div>
  </div>

  <!-- MAIN CONTENT -->
  <main id="main-content"></main>

  <!-- POWERED BY -->
  <div class="powered">
    <a href="https://wegconsulting.com">ReceiptVault by WEG Consulting</a> &nbsp;·&nbsp; AI-powered receipt management
  </div>
</div>

// Helpers
function activeCompany() { return RV.companies.find(c => c.id === RV.activeCompanyId) || RV.companies[0]; }
function activeReceipts() { return activeCompany().receipts; }

// ── COMPANY SWITCHER LOGIC ──
function initSwitcher() {
  updatePill();
  renderCompanyList();
  renderColorRow();
  document.addEventListener('click', e => {
    if (!document.getElementById('co-switcher')?.contains(e.target)) closeSwitcher();
  });
}

function updatePill() {
  const co = activeCompany();
  const dot = document.getElementById('co-dot');
  const lbl = document.getElementById('co-name-label');
  if (dot) dot.style.background = co.color;
  if (lbl) lbl.textContent = co.name;
}

function renderCompanyList() {
  const list = document.getElementById('co-list');
  if (!list) return;
  list.innerHTML = RV.companies.map(co => `
    <div class="co-item ${co.id === RV.activeCompanyId ? 'active' : ''}" onclick="switchCompany('${co.id}')">
      <div class="co-dot" style="background:${co.color};width:10px;height:10px;border-radius:50%;flex-shrink:0;"></div>
      <div class="co-item-info">
        <div class="co-item-name">${co.name}${co.isDefault ? '<span class=\"co-default-tag\">DEFAULT</span>' : ''}</div>
        <div class="co-item-meta">${co.receipts.length} receipts · $${co.receipts.reduce((s,r)=>s+r.amount,0).toFixed(0)}</div>
      </div>
      ${co.id === RV.activeCompanyId ? '<span class="co-item-check">✓</span>' : ''}
    </div>
    ${co.id === RV.activeCompanyId && !co.isDefault ? `<div class="co-set-default" onclick="setDefault('${co.id}')">Set as default</div>` : ''}
  `).join('');
  // Show/hide add button based on limit
  const trigger = document.getElementById('co-add-trigger');
  if (trigger) trigger.style.display = RV.companies.length >= 5 ? 'none' : 'flex';
}

function renderColorRow() {
  const row = document.getElementById('co-color-row');
  if (!row) return;
  row.innerHTML = CO_COLORS.map(c =>
    `<div class="co-color-swatch ${c === selectedColor ? 'selected' : ''}" style="background:${c};" onclick="selectColor('${c}',this)"></div>`
  ).join('');
}

function selectColor(color, el) {
  selectedColor = color;
  document.querySelectorAll('.co-color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}

function toggleSwitcher(e) {
  e.stopPropagation();
  RV.switcherOpen = !RV.switcherOpen;
  document.getElementById('co-dropdown').classList.toggle('open', RV.switcherOpen);
  document.getElementById('co-chevron').classList.toggle('open', RV.switcherOpen);
  if (RV.switcherOpen) renderCompanyList();
}

function closeSwitcher() {
  RV.switcherOpen = false;
  RV.addFormOpen = false;
  const dd = document.getElementById('co-dropdown');
  const ch = document.getElementById('co-chevron');
  const af = document.getElementById('co-add-form');
  if (dd) dd.classList.remove('open');
  if (ch) ch.classList.remove('open');
  if (af) af.classList.remove('open');
}

function switchCompany(id) {
  RV.activeCompanyId = id;
  RV.emailOpen = false;
  closeSwitcher();
  updatePill();
  render();
}

function setDefault(id) {
  RV.companies.forEach(c => c.isDefault = c.id === id);
  renderCompanyList();
}

function toggleAddForm() {
  RV.addFormOpen = !RV.addFormOpen;
  const form = document.getElementById('co-add-form');
  if (form) form.classList.toggle('open', RV.addFormOpen);
  if (RV.addFormOpen) {
    document.getElementById('co-add-name')?.focus();
    renderColorRow();
  }
}

function addCompany() {
  const name = document.getElementById('co-add-name')?.value.trim();
  if (!name) { document.getElementById('co-add-name')?.focus(); return; }
  if (RV.companies.length >= 5) return;
  const id = 'c' + Date.now();
  RV.companies.push({ id, name, color: selectedColor, isDefault: false, receipts: [] });
  RV.activeCompanyId = id;
  selectedColor = CO_COLORS[RV.companies.length % CO_COLORS.length];
  closeSwitcher();
  updatePill();
  render();
}

    init();
  } else {
    const err = document.getElementById('gate-error');
    const inp = document.getElementById('gate-input');
    if (err) err.style.display = 'block';
    if (inp) { inp.value = ''; inp.focus(); inp.style.borderColor = '#dc2626'; }
    setTimeout(() => { if (inp) inp.style.borderColor = '#e2e8f0'; }, 1500);
  }
}

// ── INIT ──
function init() {
  render();
  initSwitcher();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    if (checkGate()) { init(); } else { showGate(); }
  });
} else {
  if (checkGate()) { init(); } else { showGate(); }
}
</script>
</body>
</html>
