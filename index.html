<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ReceiptVault">
<meta name="theme-color" content="#ffffff">
<meta name="description" content="Capture, organize, and sync business receipts from anywhere. Camera, upload, drag & drop, or email.">
<title>ReceiptVault ŌĆö Business Receipt Management</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:       #0f1923;
    --ink2:      #2d3d4f;
    --ink3:      #64748b;
    --rule:      #e2e8f0;
    --rule2:     #f1f5f9;
    --paper:     #ffffff;
    --paper2:    #f8fafc;
    --paper3:    #f1f5f9;
    --blue:      #1d6fbf;
    --blue-lt:   #eff6ff;
    --blue-mid:  #dbeafe;
    --green:     #16a34a;
    --green-lt:  #f0fdf4;
    --amber:     #d97706;
    --amber-lt:  #fffbeb;
    --red:       #dc2626;
    --shadow-sm: 0 1px 3px rgba(15,25,35,0.08), 0 1px 2px rgba(15,25,35,0.04);
    --shadow-md: 0 4px 12px rgba(15,25,35,0.08), 0 2px 4px rgba(15,25,35,0.04);
    --shadow-lg: 0 16px 40px rgba(15,25,35,0.10), 0 4px 8px rgba(15,25,35,0.04);
    --radius:    12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body { height: 100%; background: var(--paper2); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; overflow: hidden; }

  /* ŌöĆŌöĆ LAYOUT ŌöĆŌöĆ */
  #app { display: flex; flex-direction: column; height: 100%; max-width: 600px; margin: 0 auto; background: var(--paper); box-shadow: var(--shadow-lg); position: relative; }

  /* ŌöĆŌöĆ HEADER ŌöĆŌöĆ */
  header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--rule);
    display: flex; align-items: center; gap: 12px;
    background: var(--paper);
    position: sticky; top: 0; z-index: 10;
    flex-shrink: 0;
  }
  .logo-mark {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--blue) 0%, #1a4fa0 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; box-shadow: 0 2px 8px rgba(29,111,191,0.3);
    flex-shrink: 0;
  }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--ink); letter-spacing: -0.02em; }
  .logo-text span { color: var(--blue); }
  .header-tag { margin-left: auto; font-size: 11px; color: var(--ink3); background: var(--paper3); border: 1px solid var(--rule); padding: 3px 9px; border-radius: 20px; font-weight: 500; letter-spacing: 0.02em; }

  /* ŌöĆŌöĆ TABS ŌöĆŌöĆ */
  .tabs { display: flex; border-bottom: 1px solid var(--rule); background: var(--paper); flex-shrink: 0; padding: 0 16px; gap: 2px; }
  .tab { padding: 11px 14px; font-size: 13px; font-weight: 500; color: var(--ink3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; white-space: nowrap; }
  .tab:hover { color: var(--ink2); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab-badge { display: inline-block; background: var(--amber); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 10px; margin-left: 5px; vertical-align: middle; }

  /* ŌöĆŌöĆ MAIN SCROLL ŌöĆŌöĆ */
  main { flex: 1; overflow-y: auto; overscroll-behavior: contain; }
  main::-webkit-scrollbar { width: 4px; }
  main::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 4px; }

  /* ŌöĆŌöĆ PANELS ŌöĆŌöĆ */
  .panel-wrap { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

  /* ŌöĆŌöĆ STATS ROW ŌöĆŌöĆ */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .stat-card { background: var(--paper); border: 1px solid var(--rule); border-radius: var(--radius); padding: 14px 12px; box-shadow: var(--shadow-sm); }
  .stat-label { font-size: 10px; font-weight: 600; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--ink); line-height: 1; margin-bottom: 2px; font-family: 'DM Mono', monospace; }
  .stat-value.blue  { color: var(--blue); }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }
  .stat-sub { font-size: 10px; color: var(--ink3); }

  /* ŌöĆŌöĆ UPLOAD CARD ŌöĆŌöĆ */
  .upload-card { background: var(--paper); border: 1px solid var(--rule); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
  .upload-card-header { padding: 14px 16px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; gap: 10px; }
  .upload-card-title { font-size: 13px; font-weight: 600; color: var(--ink); }
  .upload-card-sub { font-size: 11px; color: var(--ink3); margin-top: 1px; }
  .upload-card-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  /* ŌöĆŌöĆ DROP ZONE ŌöĆŌöĆ */
  .dropzone {
    border: 2px dashed var(--rule); border-radius: 10px;
    padding: 28px 20px; text-align: center;
    background: var(--paper2); cursor: pointer;
    transition: all 0.2s;
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--blue); background: var(--blue-lt);
  }
  .dropzone-icon { font-size: 32px; margin-bottom: 8px; }
  .dropzone-label { font-size: 14px; font-weight: 500; color: var(--ink2); margin-bottom: 3px; }
  .dropzone-sub { font-size: 12px; color: var(--ink3); }
  .dropzone-link { color: var(--blue); font-weight: 500; text-decoration: none; }

  /* ŌöĆŌöĆ METHOD BUTTONS ŌöĆŌöĆ */
  .method-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .method-btn {
    border: 1px solid var(--rule); border-radius: 10px; padding: 14px 10px;
    text-align: center; background: var(--paper2); cursor: pointer;
    transition: all 0.15s; display: block; text-decoration: none;
  }
  .method-btn:hover { border-color: var(--blue); background: var(--blue-lt); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .method-icon { font-size: 22px; margin-bottom: 6px; }
  .method-label { font-size: 12px; font-weight: 600; color: var(--ink); display: block; margin-bottom: 2px; }
  .method-sub { font-size: 10px; color: var(--ink3); }

  /* ŌöĆŌöĆ EMAIL INFO DRAWER ŌöĆŌöĆ */
  .email-drawer {
    background: var(--blue-lt); border: 1px solid var(--blue-mid);
    border-radius: 10px; padding: 14px 16px; display: none;
  }
  .email-drawer.open { display: block; }
  .email-address {
    font-family: 'DM Mono', monospace; font-size: 13px;
    background: var(--paper); border: 1px solid var(--blue-mid);
    border-radius: 7px; padding: 10px 12px; color: var(--ink);
    margin: 8px 0; word-break: break-all; cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .email-address:hover { background: var(--blue-mid); }
  .copy-btn { font-size: 11px; color: var(--blue); font-family: 'DM Sans', sans-serif; font-weight: 600; flex-shrink: 0; }

  /* ŌöĆŌöĆ UPLOAD PREVIEW ŌöĆŌöĆ */
  .upload-preview { display: flex; flex-direction: column; gap: 8px; }
  .preview-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--paper2); border: 1px solid var(--rule);
    border-radius: 9px; padding: 10px 12px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .preview-thumb { width: 44px; height: 44px; border-radius: 7px; object-fit: cover; border: 1px solid var(--rule); flex-shrink: 0; }
  .preview-thumb-placeholder { width: 44px; height: 44px; border-radius: 7px; background: var(--paper3); border: 1px solid var(--rule); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .preview-info { flex: 1; min-width: 0; }
  .preview-name { font-size: 12px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .preview-meta { font-size: 11px; color: var(--ink3); margin-top: 2px; }
  .preview-status { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 5px; flex-shrink: 0; }
  .preview-status.processing { background: var(--amber-lt); color: var(--amber); border: 1px solid #fde68a; }
  .preview-status.done { background: var(--green-lt); color: var(--green); border: 1px solid #bbf7d0; }
  .preview-status.error { background: #fef2f2; color: var(--red); border: 1px solid #fecaca; }

  /* ŌöĆŌöĆ RECEIPT NAME INLINE EDIT ŌöĆŌöĆ */
  .receipt-name-wrap { display: flex; align-items: center; gap: 4px; }
  .receipt-name-display { font-size: 12px; font-weight: 500; color: var(--ink); cursor: pointer; border-bottom: 1px dashed transparent; transition: border-color 0.15s; }
  .receipt-name-display:hover { border-bottom-color: var(--blue); color: var(--blue); }
  .receipt-name-input {
    font-size: 12px; font-weight: 500; color: var(--ink); border: none;
    border-bottom: 1px solid var(--blue); background: transparent; outline: none;
    font-family: 'DM Sans', sans-serif; width: 100%; padding: 0;
  }
  .edit-hint { font-size: 10px; color: var(--ink3); opacity: 0; transition: opacity 0.2s; }
  .preview-info:hover .edit-hint { opacity: 1; }

  /* ŌöĆŌöĆ RECEIPT TABLE ŌöĆŌöĆ */
  .receipt-table-wrap { background: var(--paper); border: 1px solid var(--rule); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
  .table-header { padding: 14px 16px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; justify-content: space-between; }
  .table-title { font-size: 13px; font-weight: 600; color: var(--ink); }
  .table-count { font-size: 12px; color: var(--ink3); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--paper2); border-bottom: 1px solid var(--rule); }
  th { padding: 9px 14px; font-size: 10px; font-weight: 700; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.06em; text-align: left; }
  th.right { text-align: right; }
  td { padding: 12px 14px; border-bottom: 1px solid var(--rule); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--paper2); }
  .vendor-name { font-size: 13px; font-weight: 500; color: var(--ink); }
  .vendor-emp { font-size: 11px; color: var(--ink3); margin-top: 1px; }
  .amount { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; color: var(--ink); text-align: right; }
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 5px; }
  .badge.synced  { background: var(--green-lt); color: var(--green); border: 1px solid #bbf7d0; }
  .badge.pending { background: var(--amber-lt); color: var(--amber); border: 1px solid #fde68a; }
  .badge.cat     { background: var(--paper3); color: var(--ink2); border: 1px solid var(--rule); }
  .via-icon { font-size: 14px; cursor: default; }

  /* ŌöĆŌöĆ MOBILE BOTTOM NAV ŌöĆŌöĆ */
  .bottom-bar {
    border-top: 1px solid var(--rule); padding: 12px 20px;
    background: var(--paper); flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--ink3);
  }
  .bottom-cta {
    background: var(--blue); color: #fff;
    border: none; border-radius: 8px; padding: 9px 16px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    box-shadow: 0 2px 8px rgba(29,111,191,0.3);
    transition: all 0.15s;
  }
  .bottom-cta:hover { background: #1a5fa8; transform: translateY(-1px); }

  /* ŌöĆŌöĆ EMPTY STATE ŌöĆŌöĆ */
  .empty-state { padding: 60px 30px; text-align: center; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--ink2); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; color: var(--ink3); line-height: 1.6; }

  /* ŌöĆŌöĆ EXPORT ŌöĆŌöĆ */
  .export-bar { background: var(--paper); border: 1px solid var(--rule); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .export-bar-title { font-size: 13px; font-weight: 600; color: var(--ink); flex: 1; min-width: 120px; }
  .export-btn { padding: 9px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; border: none; transition: all 0.15s; white-space: nowrap; }
  .export-btn.primary { background: var(--blue); color: #fff; box-shadow: 0 2px 8px rgba(29,111,191,0.3); }
  .export-btn.primary:hover { background: #1a5fa8; transform: translateY(-1px); }
  .export-btn.secondary { background: var(--paper2); color: var(--ink2); border: 1px solid var(--rule); }
  .export-btn.secondary:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-lt); }
  .export-select-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--ink3); }
  .export-select-row input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--blue); cursor: pointer; }
  .export-modal-overlay { position: fixed; inset: 0; background: rgba(15,25,35,0.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; padding: 20px; animation: fadeIn 0.2s ease; }
  .export-modal { background: var(--paper); border-radius: 20px 20px 16px 16px; width: 100%; max-width: 500px; padding: 28px 24px 32px; box-shadow: var(--shadow-lg); animation: slideUp 0.25s cubic-bezier(0.16,1,0.3,1); }
  @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .export-modal-title { font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 4px; letter-spacing: -0.02em; }
  .export-modal-sub { font-size: 13px; color: var(--ink3); margin-bottom: 20px; line-height: 1.5; }
  .export-field { margin-bottom: 14px; }
  .export-label { display: block; font-size: 11px; font-weight: 600; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .export-input { width: 100%; padding: 11px 13px; border: 1.5px solid var(--rule); border-radius: 9px; font-size: 14px; color: var(--ink); background: var(--paper2); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.15s; }
  .export-input:focus { border-color: var(--blue); background: var(--paper); }
  .export-summary { background: var(--paper2); border: 1px solid var(--rule); border-radius: 9px; padding: 12px 14px; margin-bottom: 16px; font-size: 12px; color: var(--ink3); line-height: 1.8; }
  .export-summary strong { color: var(--ink); }
  .export-modal-actions { display: flex; gap: 8px; }


  .powered { text-align: center; padding: 10px; font-size: 10px; color: var(--ink3); border-top: 1px solid var(--rule); flex-shrink: 0; }
  .powered a { color: var(--ink3); text-decoration: none; }
  .powered a:hover { color: var(--blue); }

  /* ŌöĆŌöĆ FADE IN ŌöĆŌöĆ */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.3s ease both; }
  .fade-up:nth-child(2) { animation-delay: 0.05s; }
  .fade-up:nth-child(3) { animation-delay: 0.10s; }
  .fade-up:nth-child(4) { animation-delay: 0.15s; }

  /* ŌöĆŌöĆ RESPONSIVE ŌöĆŌöĆ */
  @media (max-width: 480px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .method-grid { grid-template-columns: repeat(3, 1fr); }
    th.hide-mobile, td.hide-mobile { display: none; }
  }

  /* ŌöĆŌöĆ COMPANY SWITCHER ŌöĆŌöĆ */
  .co-switcher { position: relative; margin-left: auto; }
  .co-pill {
    display: flex; align-items: center; gap: 7px; cursor: pointer;
    padding: 6px 10px 6px 8px; border-radius: 20px;
    border: 1px solid var(--rule); background: var(--paper2);
    font-size: 12px; font-weight: 600; color: var(--ink2);
    transition: all 0.15s; user-select: none;
  }
  .co-pill:hover { border-color: var(--blue); background: var(--blue-lt); color: var(--blue); }
  .co-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .co-chevron { font-size: 9px; color: var(--ink3); margin-left: 2px; transition: transform 0.2s; }
  .co-chevron.open { transform: rotate(180deg); }
  .co-dropdown {
    position: absolute; right: 0; top: calc(100% + 8px);
    background: var(--paper); border: 1px solid var(--rule); border-radius: 14px;
    box-shadow: var(--shadow-lg); min-width: 240px; z-index: 100;
    overflow: hidden; display: none;
    animation: dropIn 0.15s ease;
  }
  @keyframes dropIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .co-dropdown.open { display: block; }
  .co-dropdown-label { padding: 10px 14px 6px; font-size: 10px; font-weight: 700; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.08em; }
  .co-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer; transition: background 0.12s;
    border-radius: 0;
  }
  .co-item:hover { background: var(--paper2); }
  .co-item.active { background: var(--blue-lt); }
  .co-item-info { flex: 1; min-width: 0; }
  .co-item-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .co-item-meta { font-size: 11px; color: var(--ink3); }
  .co-item-check { color: var(--blue); font-size: 14px; font-weight: 700; }
  .co-default-tag { font-size: 9px; font-weight: 700; color: var(--blue); background: var(--blue-mid); padding: 1px 6px; border-radius: 4px; margin-left: 4px; }
  .co-divider { height: 1px; background: var(--rule); margin: 4px 0; }
  .co-add-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer; transition: background 0.12s;
    color: var(--blue); font-size: 13px; font-weight: 600;
  }
  .co-add-btn:hover { background: var(--blue-lt); }
  .co-add-form { padding: 10px 14px 14px; display: none; flex-direction: column; gap: 8px; }
  .co-add-form.open { display: flex; }
  .co-add-input {
    width: 100%; padding: 8px 10px; border-radius: 8px;
    border: 1px solid var(--rule); background: var(--paper2);
    font-size: 13px; color: var(--ink); font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  .co-add-input:focus { border-color: var(--blue); background: var(--blue-lt); }
  .co-color-row { display: flex; gap: 6px; }
  .co-color-swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.12s; }
  .co-color-swatch.selected { border-color: var(--ink2); }
  .co-add-actions { display: flex; gap: 6px; }
  .co-save-btn { flex: 1; padding: 8px; border-radius: 7px; border: none; background: var(--blue); color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .co-cancel-btn { padding: 8px 12px; border-radius: 7px; border: 1px solid var(--rule); background: transparent; color: var(--ink3); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .co-set-default { font-size: 10px; color: var(--blue); cursor: pointer; text-align: center; padding: 6px; }
  .co-set-default:hover { text-decoration: underline; }


  /* ŌöĆŌöĆ DESKTOP LAYOUT ŌöĆŌöĆ */
  @media (min-width: 768px) {
    body { overflow: auto; }
    #app { 
      max-width: 100%; 
      flex-direction: row; 
      height: 100vh;
      box-shadow: none;
    }
    /* Left sidebar */
    #app-sidebar {
      width: 260px;
      min-width: 260px;
      border-right: 1px solid var(--rule);
      display: flex;
      flex-direction: column;
      background: var(--paper);
      height: 100vh;
      position: sticky;
      top: 0;
    }
    #app-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100vh;
      overflow: hidden;
    }
    /* Hide mobile header/tabs in desktop - shown in sidebar */
    #mobile-header { display: none; }
    #mobile-tabs { display: none; }
    #desktop-sidebar-content { display: flex; flex-direction: column; height: 100%; }
    
    /* Desktop main area splits when receipt selected */
    #main-split {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #main-content {
      flex: 1;
      overflow-y: auto;
      min-width: 0;
    }
    #receipt-detail-panel {
      width: 380px;

  @media (max-width: 767px) {

    #desktop-sidebar-content { display: none; }

  }

  /* ŌöĆŌöĆ RECEIPT DETAIL PANEL ŌöĆŌöĆ */
  .detail-img-wrap {
    width: 100%; aspect-ratio: 4/3; background: var(--paper2);
    border-bottom: 1px solid var(--rule);

  .detail-img-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .detail-img-placeholder { font-size: 64px; opacity: 0.2; }
  .detail-field { padding: 14px 20px; border-bottom: 1px solid var(--rule2); }
  .detail-field-label { font-size: 10px; font-weight: 700; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .detail-field-value { font-size: 14px; color: var(--ink); font-weight: 500; }
  .detail-field-input {

  }
  .detail-field-input:focus { border-color: var(--blue); background: var(--paper); }
  .detail-field-select {
    width: 100%; padding: 8px 10px; border: 1.5px solid var(--rule);
    border-radius: 8px; font-size: 14px; color: var(--ink);

    outline: none; cursor: pointer;
  }
  .detail-field-select:focus { border-color: var(--blue); }
  .detail-actions { padding: 16px 20px; display: flex; gap: 8px; }
  .detail-close-btn {
    position: absolute; top: 12px; right: 12px;

    border: none; cursor: pointer; font-size: 14px;

  }

  /* ŌöĆŌöĆ RECEIPT VIEWER MODAL (mobile) ŌöĆŌöĆ */
  .rv-modal-overlay {
    position: fixed; inset: 0;

  }
  .rv-modal {
    background: var(--paper);
    border-radius: 20px 20px 0 0;

  }
  .rv-modal-title { font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; }
  .rv-modal-close {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--paper2); border: 1px solid var(--rule);
    cursor: pointer; font-size: 14px; display: flex;
    align-items: center; justify-content: center;
  }

  /* Desktop sidebar nav */
  .sidebar-nav { padding: 8px; }
  .sidebar-nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 9px; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--ink3);
    transition: all 0.15s; user-select: none;
  }
  .sidebar-nav-item:hover { background: var(--paper2); color: var(--ink); }
  .sidebar-nav-item.active { background: var(--blue-lt); color: var(--blue); font-weight: 600; }
  .sidebar-nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-receipt-list { flex: 1; overflow-y: auto; border-top: 1px solid var(--rule); }
  .sidebar-receipt-item {
    padding: 11px 16px; border-bottom: 1px solid var(--rule2);

    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-receipt-item:hover { background: var(--paper2); }
  .sidebar-receipt-item.active { background: var(--blue-lt); }
  .sidebar-receipt-thumb {
    width: 36px; height: 36px; border-radius: 6px;
    object-fit: cover; border: 1px solid var(--rule); flex-shrink: 0;
  }
  .sidebar-receipt-thumb-ph {
    width: 36px; height: 36px; border-radius: 6px;
    background: var(--paper3); border: 1px solid var(--rule);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .sidebar-receipt-info { min-width: 0; flex: 1; }
  .sidebar-receipt-name { font-size: 12px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-receipt-meta { font-size: 11px; color: var(--ink3); margin-top: 1px; }
  .sidebar-receipt-amount { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600; color: var(--ink); flex-shrink: 0; }

</style>

<body>
<div id="app" style="display:none">

  <!-- DESKTOP SIDEBAR -->
  <div id="app-sidebar">

      </div>

  <div id="app-main">

      <div class="logo-text">Receipt<span>Vault</span></div>
    </div>
    <div class="co-switcher" id="co-switcher">
      <div class="co-pill" id="co-pill" onclick="toggleSwitcher(event)">
        <div class="co-dot" id="co-dot"></div>
        <span id="co-name-label">LoadingŌĆ”</span>
        <span class="co-chevron" id="co-chevron">Ō¢╝</span>
      </div>
      <div class="co-dropdown" id="co-dropdown">

        </div>

<script>
// ŌöĆŌöĆ COMPANY COLORS ŌöĆŌöĆ
const CO_COLORS = ['#1d6fbf','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#db2777','#65a30d'];
let selectedColor = CO_COLORS[0];

// ŌöĆŌöĆ CATEGORIES ŌöĆŌöĆ
const RV_CATEGORIES = [
  'Fuel & Oil', 'Parts & Repairs', 'Equipment', 'Supplies & Materials',
  'Subcontractors', 'Labor', 'Meals & Entertainment', 'Office & Admin',
  'Travel', 'Utilities', 'Insurance', 'Cost of Goods Sold', 'Other'
];

// ŌöĆŌöĆ PERSISTENCE ŌöĆŌöĆ
const STORAGE_KEY = 'rv_data_v1';

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      activeCompanyId: RV.activeCompanyId,
      companies: RV.companies
    }));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (data.companies && data.companies.length > 0) {
      RV.companies = data.companies;
      RV.activeCompanyId = data.activeCompanyId || data.companies[0].id;
      RV.tab = 'capture'; // always start on capture tab
      return true;
    }
  } catch(e) {}
  return false;
}

// ŌöĆŌöĆ STATE ŌöĆŌöĆ
const RV = {
  tab: 'capture',
  emailOpen: false,
  switcherOpen: false,
  addFormOpen: false,
  activeCompanyId: 'c1',
  companies: [
    {
      id: 'c1', name: 'My Company', color: '#1d6fbf', isDefault: true,
      receipts: []
    }
  ]
};

// Helpers
function activeCompany() { return RV.companies.find(c => c.id === RV.activeCompanyId) || RV.companies[0]; }
function activeReceipts() { return activeCompany().receipts; }

// ŌöĆŌöĆ COMPANY SWITCHER LOGIC ŌöĆŌöĆ
function initSwitcher() {
  // Retry if DOM elements not ready yet
  if (!document.getElementById('co-dot')) {
    setTimeout(initSwitcher, 50);
    return;
  }
  updatePill();
  renderCompanyList();
  renderColorRow();
  document.addEventListener('click', e => {
    if (!document.getElementById('co-switcher')?.contains(e.target)) closeSwitcher();
  });
}

function updatePill() {
  const co = activeCompany();
  const dot = document.getElementById('co-dot');
  const lbl = document.getElementById('co-name-label');
  if (dot) dot.style.background = co.color;
  if (lbl) lbl.textContent = co.name;
  // Desktop sidebar sync
  const dotD = document.getElementById('co-dot-desktop');
  const lblD = document.getElementById('co-name-label-desktop');
  if (dotD) dotD.style.background = co.color;
  if (lblD) lblD.textContent = co.name;
}

function renderCompanyList() {
  const list = document.getElementById('co-list');
  if (!list) return;
  list.innerHTML = RV.companies.map(co => `
    <div class="co-item ${co.id === RV.activeCompanyId ? 'active' : ''}" onclick="switchCompany('${co.id}')">
      <div class="co-dot" style="background:${co.color};width:10px;height:10px;border-radius:50%;flex-shrink:0;"></div>
      <div class="co-item-info">
        <div class="co-item-name">${co.name}${co.isDefault ? '<span class=\"co-default-tag\">DEFAULT</span>' : ''}</div>
        <div class="co-item-meta">${co.receipts.length} receipts ┬Ę $${co.receipts.reduce((s,r)=>s+r.amount,0).toFixed(0)}</div>
      </div>
      ${co.id === RV.activeCompanyId ? '<span class="co-item-check">Ō£ō</span>' : ''}
    </div>
    ${co.id === RV.activeCompanyId && !co.isDefault ? `<div class="co-set-default" onclick="setDefault('${co.id}')">Set as default</div>` : ''}
  `).join('');
  // Show/hide add button based on limit
  const trigger = document.getElementById('co-add-trigger');
  if (trigger) trigger.style.display = RV.companies.length >= 5 ? 'none' : 'flex';
}

function renderColorRow() {
  const row = document.getElementById('co-color-row');
  if (!row) return;
  row.innerHTML = CO_COLORS.map(c =>
    `<div class="co-color-swatch ${c === selectedColor ? 'selected' : ''}" style="background:${c};" onclick="selectColor('${c}',this)"></div>`
  ).join('');
}

function selectColor(color, el) {
  selectedColor = color;
  document.querySelectorAll('.co-color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}

function toggleSwitcher(e) {
  e.stopPropagation();
  RV.switcherOpen = !RV.switcherOpen;
  document.getElementById('co-dropdown').classList.toggle('open', RV.switcherOpen);
  document.getElementById('co-chevron').classList.toggle('open', RV.switcherOpen);
  if (RV.switcherOpen) renderCompanyList();
}

function closeSwitcher() {
  RV.switcherOpen = false;
  RV.addFormOpen = false;
  const dd = document.getElementById('co-dropdown');
  const ch = document.getElementById('co-chevron');
  const af = document.getElementById('co-add-form');
  if (dd) dd.classList.remove('open');
  if (ch) ch.classList.remove('open');
  if (af) af.classList.remove('open');
}

function switchCompany(id) {
  RV.activeCompanyId = id;
  RV.emailOpen = false;
  closeSwitcher();
  updatePill();
  saveState();
  render();
}

function setDefault(id) {
  RV.companies.forEach(c => c.isDefault = c.id === id);
  saveState();
  renderCompanyList();
}

function toggleAddForm() {
  RV.addFormOpen = !RV.addFormOpen;
  const form = document.getElementById('co-add-form');
  if (form) form.classList.toggle('open', RV.addFormOpen);
  if (RV.addFormOpen) {
    document.getElementById('co-add-name')?.focus();
    renderColorRow();
  }
}

function addCompany() {
  const name = document.getElementById('co-add-name')?.value.trim();
  if (!name) { document.getElementById('co-add-name')?.focus(); return; }
  if (RV.companies.length >= 5) return;
  const id = 'c' + Date.now();
  RV.companies.push({ id, name, color: selectedColor, isDefault: false, receipts: [] });
  RV.activeCompanyId = id;
  selectedColor = CO_COLORS[RV.companies.length % CO_COLORS.length];
  closeSwitcher();
  updatePill();
  saveState();
  render();
}

const methodIcon = { camera:'­¤ōĘ', upload:'­¤ōü', email:'Ō£ē’ĖÅ', drag:'­¤¢▒’ĖÅ' };
const methodLabel = { camera:'Camera', upload:'Upload', email:'Email-in', drag:'Drag & drop' };
const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

function switchTab(tab) {
  RV.tab = tab;
  // Mobile tabs
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['capture','receipts','summary'][i] === tab);
  });
  // Desktop sidebar nav
  ['capture','receipts','summary'].forEach(t => {
    const el = document.getElementById('snav-' + t);
    if (el) el.classList.toggle('active', t === tab);
  });
  render();
  renderSidebarReceipts();
}

function render() {
  const el = document.getElementById('main-content');
  if (!el) return;
  el.innerHTML = ''; // always clear first
  if (RV.tab === 'capture')       el.innerHTML = renderCapture();
  else if (RV.tab === 'receipts') el.innerHTML = renderReceipts();
  else if (RV.tab === 'summary')  el.innerHTML = renderSummary();
  // Sync tab highlight with state
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['capture','receipts','summary'][i] === RV.tab);
  });

  // Set camera capture on mobile after render
  if (RV.tab === 'capture' && isMobile) {
    const camInput = document.getElementById('camera-input');
    if (camInput) camInput.setAttribute('capture', 'environment');
  }

  // Update pending badges (mobile + desktop)
  const pending = activeReceipts().filter(r => r.status === 'pending').length;
  const badge = document.getElementById('pending-badge');
  if (badge) { badge.textContent = pending; badge.style.display = pending ? 'inline-block' : 'none'; }
  const badgeD = document.getElementById('pending-badge-desktop');
  if (badgeD) { badgeD.textContent = pending; badgeD.style.display = pending ? 'inline-block' : 'none'; }
  renderSidebarReceipts();
}

function renderSidebarReceipts() {
  const list = document.getElementById('sidebar-receipt-list');
  if (!list) return;
  const receipts = activeReceipts();
  if (receipts.length === 0) {
    list.innerHTML = '<div style="padding:20px 16px;text-align:center;font-size:12px;color:var(--ink3);">No receipts yet</div>';
    return;
  }
  list.innerHTML = receipts.map(r => `
    <div class="sidebar-receipt-item ${RV.selectedReceiptId === r.id ? 'active' : ''}" onclick="openReceiptDetail('${r.id}')">
      ${r.imageUrl ? `<img class="sidebar-receipt-thumb" src="${r.imageUrl}" alt="">` : `<div class="sidebar-receipt-thumb-ph">${r.method==='camera'?'­¤ōĘ':r.method==='email'?'Ō£ē’ĖÅ':'­¤ōä'}</div>`}
      <div class="sidebar-receipt-info">
        <div class="sidebar-receipt-name">${r.name || formatReceiptName(r.vendor, r.date, r.amount)}</div>
        <div class="sidebar-receipt-meta">${r.date} ┬Ę <span style="color:${r.status==='synced'?'var(--green)':'var(--amber)'};">${r.status==='synced'?'Synced':'Pending'}</span></div>
      </div>
      <div class="sidebar-receipt-amount">$${(r.amount||0).toFixed(2)}</div>
    </div>`).join('');
}

// ŌöĆŌöĆ CAPTURE TAB ŌöĆŌöĆ
function renderCapture() {
  const receipts = activeReceipts();
  const total = receipts.reduce((s,r) => s + r.amount, 0);
  const synced = receipts.filter(r => r.status === 'synced').length;
  const pending = receipts.filter(r => r.status === 'pending').length;

  return `<div class="panel-wrap">

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card fade-up">
        <div class="stat-label">This Month</div>
        <div class="stat-value blue">${receipts.length}</div>
        <div class="stat-sub">receipts captured</div>
      </div>
      <div class="stat-card fade-up">
        <div class="stat-label">Total</div>
        <div class="stat-value">$${total.toFixed(0)}</div>
        <div class="stat-sub">logged expenses</div>
      </div>
      <div class="stat-card fade-up">
        <div class="stat-label">Synced</div>
        <div class="stat-value green">${synced}</div>
        <div class="stat-sub">to BankTracker</div>
      </div>
      <div class="stat-card fade-up">
        <div class="stat-label">Pending</div>
        <div class="stat-value amber">${pending}</div>
        <div class="stat-sub">need review</div>
      </div>
    </div>

    <!-- UPLOAD CARD -->
    <div class="upload-card fade-up">
      <div class="upload-card-header">
        <div>
          <div class="upload-card-title">Add a Receipt</div>
          <div class="upload-card-sub">Snap, upload, drag in, or forward by email</div>
        </div>
      </div>
      <div class="upload-card-body">

        <!-- DRAG & DROP ZONE -->
        <div class="dropzone" id="dropzone"
          ondragover="event.preventDefault();document.getElementById('dropzone').classList.add('drag-over')"
          ondragleave="document.getElementById('dropzone').classList.remove('drag-over')"
          ondrop="event.preventDefault();document.getElementById('dropzone').classList.remove('drag-over');rvHandleFiles(event.dataTransfer.files,'drag')"
          onclick="document.getElementById('rv-browse-main').click()">
          <div class="dropzone-icon">­¤ōé</div>
          <div class="dropzone-label">Drag receipts here, or <span class="dropzone-link">browse files</span></div>
          <div class="dropzone-sub" style="margin-top:4px;">JPG ┬Ę PNG ┬Ę PDF ┬Ę up to 10 files at once</div>
          <input id="rv-browse-main" type="file" accept="image/*,application/pdf" multiple style="display:none" onchange="rvHandleFiles(this.files,'upload')">
        </div>

        <!-- METHOD BUTTONS -->
        <div class="method-grid">
          <label class="method-btn" id="camera-btn-label" title="${isMobile ? 'Opens rear camera' : 'Camera available on mobile ŌĆö opens file picker on desktop'}">
            <input type="file" accept="image/*" id="camera-input" style="display:none" onchange="rvHandleFiles(this.files,'camera')">
            <div class="method-icon">­¤ōĘ</div>
            <span class="method-label">Camera</span>
            <span class="method-sub">${isMobile ? 'Open rear camera' : 'Mobile camera / browse'}</span>
          </label>
          <label class="method-btn">
            <input type="file" accept="image/*,application/pdf" multiple style="display:none" onchange="rvHandleFiles(this.files,'upload')">
            <div class="method-icon">­¤ōü</div>
            <span class="method-label">Browse</span>
            <span class="method-sub">Phone or computer</span>
          </label>
          <div class="method-btn" onclick="toggleEmail()">
            <div class="method-icon">Ō£ē’ĖÅ</div>
            <span class="method-label">Email In</span>
            <span class="method-sub">Forward any receipt</span>
          </div>
        </div>

        <!-- EMAIL DRAWER -->

// ŌöĆŌöĆ RECEIPT AI EXTRACTION ŌöĆŌöĆ
function formatReceiptName(vendor, date, amount) {
  const v = (vendor || 'Unknown').replace(/\s+/g, '');
  const d = date || new Date().toLocaleDateString('en-US', { month:'2-digit', day:'2-digit', year:'2-digit' }).replace(/\//g, '-');
  const a = amount != null ? '$' + parseFloat(amount).toFixed(2) : '$0.00';
  return `${v} ${d} ${a}`;
}

async function extractReceiptData(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      const dataUrl = e.target.result;
      const base64 = dataUrl.split(',')[1];
      const mediaType = dataUrl.match(/data:([\w/]+);/)?.[1] || 'image/jpeg';
      const isPDF = file.type === 'application/pdf';
      try {
        const body = {
          model: 'claude-sonnet-4-20250514',
          max_tokens: 300,
          system: `You are a receipt OCR system. Extract key fields from receipt images and PDFs.
Return ONLY valid JSON, no markdown:
{"vendor":"Business name (short)","date":"MM-DD-YY","amount":9.73,"category":"Fuel & Oil|Parts & Repairs|Equipment|Supplies & Materials|Subcontractors|Labor|Meals & Entertainment|Office & Admin|Travel|Utilities|Insurance|Cost of Goods Sold|Other","confidence":0.95}
If a field is not readable, use null. Amount is total charged as a number.`,
          messages: [{ role: 'user', content: isPDF
            ? [{ type:'document', source:{type:'base64', media_type:'application/pdf', data:base64} }, { type:'text', text:'Extract vendor, date, total amount, and category from this receipt.' }]
            : [{ type:'image', source:{type:'base64', media_type:mediaType, data:base64} }, { type:'text', text:'Extract vendor, date, total amount, and category from this receipt.' }]
          }]
        };
        const response = await fetch('/api/claude', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
        });
        const data = await response.json();
        const raw = data.content?.map(c => c.text || '').join('') || '';
        const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
        resolve({ success: true, ...parsed });
      } catch(err) {
        resolve({ success: false, vendor: null, date: null, amount: null, category: 'ŌĆö review', confidence: 0 });
      }
    };
    reader.readAsDataURL(file);
  });
}

function rvHandleFiles(files, method) {
  if (!files?.length) return;
  const preview = document.getElementById('upload-preview');
  if (!preview) return;
  preview.style.display = 'flex';
  preview.style.flexDirection = 'column';
  preview.style.gap = '8px';

  const items = Array.from(files).map(f => {
    const isImg = f.type.startsWith('image/');
    const isPDF = f.type === 'application/pdf';
    const url = isImg ? URL.createObjectURL(f) : null;
    const id = 'prev-' + Date.now() + Math.random().toString(36).slice(2);
    return { f, url, id, isImg, isPDF };
  });

  preview.innerHTML = items.map(({f, url, id, isPDF}) => `
    <div class="preview-item" id="${id}">
      ${url ? `<img class="preview-thumb" src="${url}" alt="">` : `<div class="preview-thumb-placeholder">${isPDF ? '­¤ōä' : '­¤¢╝’ĖÅ'}</div>`}
      <div class="preview-info">
        <div class="preview-name" style="font-size:11px;color:var(--ink3);">${f.name}</div>
        <div class="preview-meta">Reading receiptŌĆ”</div>
      </div>
      <span class="preview-status processing">AI Reading</span>
    </div>`).join('');

  items.forEach(async ({f, url, id}) => {
    const extracted = await extractReceiptData(f);
    const row = document.getElementById(id);
    const today = new Date();
    const fallbackDate = [String(today.getMonth()+1).padStart(2,'0'), String(today.getDate()).padStart(2,'0'), String(today.getFullYear()).slice(2)].join('-');
    const vendor   = extracted.vendor   || f.name.replace(/\.[^.]+$/, '').replace(/[-_]/g,' ').trim();
    const date     = extracted.date     || fallbackDate;
    const amount   = extracted.amount   || 0;
    const category = extracted.category || 'Other';
    const recId    = 'r' + Date.now() + Math.floor(Math.random()*10000);
    const recName  = formatReceiptName(vendor, date, amount);
    if (row) {
      const infoEl = row.querySelector('.preview-info');
      const statusEl = row.querySelector('.preview-status');
      if (infoEl) infoEl.innerHTML = `<div class="receipt-name-wrap"><div class="receipt-name-display" id="name-disp-${recId}" onclick="rvEditName('${recId}')">${recName}</div></div><div class="preview-meta">${category} ┬Ę ${methodLabel[method]||method} <span class="edit-hint">tap to edit</span></div>`;
      if (statusEl) { statusEl.textContent = extracted.success ? 'Added Ō£ō' : 'Added*'; statusEl.className = 'preview-status ' + (extracted.success ? 'done' : 'error'); }
    }
    activeCompany().receipts.unshift({ id:recId, name:recName, vendor, date, amount, category, time:today.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}), employee:'Current User', status:'pending', method, confidence:extracted.confidence||0, note:extracted.success?'':'Low confidence ŌĆö verify details' });
    saveState();
    const pendingCount = activeCompany().receipts.filter(r => r.status === 'pending').length;
    const badge = document.getElementById('pending-badge');
    if (badge) { badge.textContent = pendingCount; badge.style.display = 'inline-block'; }
  });
}

function rvSaveName(recId, newName) {

function rvDownloadCSV() {
  const selected = rvGetSelected();
  const receipts = selected.length > 0 ? selected : activeReceipts();
  const co = activeCompany();

  const headers = ['Receipt Name','Vendor','Date','Time','Amount','Category','Status','Method','Employee','Note'];
  const rows = receipts.map(r => [
    r.name || formatReceiptName(r.vendor, r.date, r.amount),
    r.vendor || '',
    r.date || '',
    r.time || '',
    (r.amount || 0).toFixed(2),
    r.category || '',
    r.status || '',
    methodLabel[r.method] || r.method || '',
    r.employee || '',
    r.note || ''
  ].map(v => `"${String(v).replace(/"/g,'""')}"`));

  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'2-digit'}).replace(/\//g,'-');
  a.href = url;
  a.download = `${co.name.replace(/\s+/g,'_')}_Receipts_${dateStr}.csv`;
  a.click();
  URL.revokeObjectURL(url);

  // Confirm download
  const btn = document.querySelector('#export-overlay .export-btn.primary');
  if (btn) { btn.textContent = 'Ō£ō Downloaded!'; btn.style.background = 'var(--green)'; setTimeout(() => { btn.textContent = 'Ō¼ć Download CSV'; btn.style.background = ''; }, 2500); }
}

function rvSendExport() {
  const email = document.getElementById('export-email')?.value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('export-email')?.focus();
    document.getElementById('export-email').style.borderColor = 'var(--red)';
    setTimeout(() => { const el = document.getElementById('export-email'); if(el) el.style.borderColor = ''; }, 1500);
    return;
  }
  // For now ŌĆö download CSV and open mailto as a bridge until backend is ready
  rvDownloadCSV();
  const selected = rvGetSelected();
  const receipts = selected.length > 0 ? selected : activeReceipts();
  const co = activeCompany();
  const note = document.getElementById('export-note')?.value.trim() || '';
  const total = receipts.reduce((s,r) => s + (r.amount||0), 0);
  const subject = encodeURIComponent(`${co.name} Receipts ŌĆö ${receipts.length} records, $${total.toFixed(2)}`);
  const body = encodeURIComponent(
    `Hi,\n\nPlease find attached the receipt export from ReceiptVault.\n\n` +
    `Company: ${co.name}\nReceipts: ${receipts.length}\nTotal: $${total.toFixed(2)}\n` +
    (note ? `\nNote: ${note}\n` : '') +
    `\nThe CSV file has been downloaded to your device ŌĆö please attach it to this email before sending.\n\n` +
    `Receipt summary:\n` +
    receipts.map(r => `ŌĆó ${r.name || formatReceiptName(r.vendor,r.date,r.amount)} ŌĆö $${(r.amount||0).toFixed(2)}`).join('\n')
  );
  window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
  setTimeout(rvCloseExport, 500);
}

  const overlay = document.createElement('div');
  overlay.id = 'approve-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,25,35,0.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;padding:20px;animation:fadeIn 0.2s ease;';
  overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:20px 20px 16px 16px;width:100%;max-width:500px;padding:24px;box-shadow:0 16px 40px rgba(0,0,0,0.3);animation:slideUp 0.25s cubic-bezier(0.16,1,0.3,1);">
      <div style="font-size:16px;font-weight:700;color:var(--ink);margin-bottom:4px;letter-spacing:-0.02em;">Approve Receipt</div>
      <div style="font-size:12px;color:var(--ink3);margin-bottom:16px;">${r.name || r.vendor}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
        <div style="background:var(--paper2);border:1px solid var(--rule);border-radius:9px;padding:10px 12px;">
          <div style="font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">Amount</div>
          <div style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--ink);">$${(r.amount||0).toFixed(2)}</div>
        </div>
        <div style="background:var(--paper2);border:1px solid var(--rule);border-radius:9px;padding:10px 12px;">
          <div style="font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">Date</div>
          <div style="font-size:15px;font-weight:600;color:var(--ink);">${r.date||'ŌĆö'}</div>
        </div>
      </div>
      <div style="margin-bottom:16px;">
        <div style="font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;">Category</div>
        <select id="approve-cat" style="width:100%;padding:10px 12px;border:1.5px solid var(--blue);border-radius:9px;font-size:14px;color:var(--ink);background:var(--paper);font-family:'DM Sans',sans-serif;outline:none;">
          ${RV_CATEGORIES.map(cat => `<option value="${cat}" ${cat===r.category?'selected':''}>${cat}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="document.getElementById('approve-overlay').remove()" style="flex:1;padding:12px;border-radius:9px;border:1px solid var(--rule);background:var(--paper2);color:var(--ink3);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Cancel</button>
        <button onclick="rvConfirmApprove('${r.id}')" style="flex:2;padding:12px;border-radius:9px;border:none;background:var(--green);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 2px 8px rgba(22,163,74,0.3);">Ō£ō Approve & Sync</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function rvConfirmApprove(id) {
  const r = activeReceipts().find(r => String(r.id) === String(id));
  const cat = document.getElementById('approve-cat')?.value;
  if (r) {
    r.status = 'synced';
    if (cat) r.category = cat;
    saveState();
  }
  document.getElementById('approve-overlay')?.remove();
  closeReceiptDetail();
  render();
}

function rvChangeCategory(id, newCat) {
  const r = activeReceipts().find(r => String(r.id) === String(id));
  if (r) { r.category = newCat; saveState(); render(); }
}

// ŌöĆŌöĆ RECEIPT DETAIL / VIEWER ŌöĆŌöĆ
function openReceiptDetail(id) {
  const r = activeReceipts().find(r => String(r.id) === String(id));
  if (!r) return;
  RV.selectedReceiptId = id;

  const isDesktop = window.innerWidth >= 768;

  if (isDesktop) {
    // Desktop: show in side panel
    const panel = document.getElementById('receipt-detail-panel');
    if (!panel) return;
    panel.classList.add('open');
    panel.innerHTML = buildDetailHTML(r, false);
    renderSidebarReceipts();
  } else {
    // Mobile: show modal
    const overlay = document.createElement('div');
    overlay.className = 'rv-modal-overlay';
    overlay.id = 'receipt-modal-overlay';
    overlay.onclick = (e) => { if (e.target === overlay) closeReceiptDetail(); };
    overlay.innerHTML = `<div class="rv-modal">${buildDetailHTML(r, true)}</div>`;
    document.body.appendChild(overlay);
  }
}

function buildDetailHTML(r, isModal) {
  const catOptions = RV_CATEGORIES.map(cat =>
    `<option value="${cat}" ${cat === r.category ? 'selected' : ''}>${cat}</option>`
  ).join('');

  const header = isModal ? `
    <div class="rv-modal-handle"></div>
    <div class="rv-modal-header">
      <div class="rv-modal-title">Receipt Details</div>
      <button class="rv-modal-close" onclick="closeReceiptDetail()">Ō£Ģ</button>
    </div>` : `
    <div style="padding:14px 20px;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:14px;font-weight:700;color:var(--ink);letter-spacing:-0.02em;">Receipt Details</div>
      <button onclick="closeReceiptDetail()" style="background:var(--paper2);border:1px solid var(--rule);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--ink3);">Close Ō£Ģ</button>
    </div>`;

  const imgSection = r.imageUrl ? `
    <div class="detail-img-wrap">
      <img src="${r.imageUrl}" alt="Receipt image" onclick="rvZoomImage('${r.imageUrl}')" style="cursor:zoom-in;">
    </div>` : `
    <div class="detail-img-wrap" style="height:140px;">
      <div class="detail-img-placeholder">­¤¦Š</div>
    </div>`;

  return `
    ${header}
    ${imgSection}
    <div class="detail-field">
      <div class="detail-field-label">Receipt Name</div>
      <input class="detail-field-input" id="detail-name-${r.id}" value="${(r.name || formatReceiptName(r.vendor, r.date, r.amount)).replace(/"/g,'&quot;')}" onblur="rvDetailSave('${r.id}')">
    </div>
    <div class="detail-field">
      <div class="detail-field-label">Vendor</div>
      <input class="detail-field-input" id="detail-vendor-${r.id}" value="${(r.vendor||'').replace(/"/g,'&quot;')}" onblur="rvDetailSave('${r.id}')">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--rule2);">
      <div class="detail-field" style="border-bottom:none;border-right:1px solid var(--rule2);">
        <div class="detail-field-label">Date</div>
        <input class="detail-field-input" id="detail-date-${r.id}" value="${r.date||''}" onblur="rvDetailSave('${r.id}')">
      </div>
      <div class="detail-field" style="border-bottom:none;">
        <div class="detail-field-label">Amount</div>
        <input class="detail-field-input" id="detail-amount-${r.id}" value="${(r.amount||0).toFixed(2)}" type="number" step="0.01" onblur="rvDetailSave('${r.id}')">
      </div>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">Category</div>
      <select class="detail-field-select" id="detail-cat-${r.id}" onchange="rvDetailSave('${r.id}')">
        ${catOptions}
      </select>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">Status</div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <span class="badge ${r.status}">${r.status === 'synced' ? 'Ō£ō Synced' : 'ŌÅ│ Pending Review'}</span>
        ${r.status === 'pending' ? `<button onclick="rvApprove('${r.id}')" style="padding:3px 10px;border-radius:5px;border:1px solid var(--blue);background:transparent;color:var(--blue);cursor:pointer;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;">Approve ŌåÆ</button>` : ''}
      </div>
    </div>
    ${r.note ? `<div class="detail-field"><div class="detail-field-label">Note</div><div style="font-size:12px;color:var(--ink3);">${r.note}</div></div>` : ''}
    <div class="detail-actions">
      <button onclick="rvDeleteReceipt('${r.id}')" style="padding:10px 14px;border-radius:8px;border:1px solid #fecaca;background:#fef2f2;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Delete</button>
      <button onclick="closeReceiptDetail()" style="flex:1;padding:10px 14px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Done</button>
    </div>`;
}

function closeReceiptDetail() {
  RV.selectedReceiptId = null;
  document.getElementById('receipt-modal-overlay')?.remove();
  const panel = document.getElementById('receipt-detail-panel');
  if (panel) { panel.classList.remove('open'); panel.innerHTML = ''; }
  renderSidebarReceipts();
}

function rvDetailSave(id) {
  const r = activeReceipts().find(r => String(r.id) === String(id));
  if (!r) return;
  const name = document.getElementById('detail-name-' + id)?.value.trim();
  const vendor = document.getElementById('detail-vendor-' + id)?.value.trim();
  const date = document.getElementById('detail-date-' + id)?.value.trim();
  const amount = parseFloat(document.getElementById('detail-amount-' + id)?.value) || 0;
  const cat = document.getElementById('detail-cat-' + id)?.value;
  if (name) r.name = name;
  if (vendor) r.vendor = vendor;
  if (date) r.date = date;
  r.amount = amount;
  if (cat) r.category = cat;
  saveState();
  render();
}

function rvDeleteReceipt(id) {
  if (!confirm('Delete this receipt?')) return;
  const co = activeCompany();
  co.receipts = co.receipts.filter(r => String(r.id) !== String(id));
  saveState();
  closeReceiptDetail();
  render();
}

function rvZoomImage(url) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';
  overlay.onclick = () => overlay.remove();
  overlay.innerHTML = `<img src="${url}" style="max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px;">`;
  document.body.appendChild(overlay);
}

// ŌöĆŌöĆ BETA GATE ŌöĆŌöĆ
const BETA_PASS = 'Pa$$w0rd';
const GATE_KEY  = 'rv_beta_auth';

function checkGate() {
  if (sessionStorage.getItem(GATE_KEY) === '1') return true;
  return false;
}

function showGate() {
  document.getElementById('app').style.display = 'none';
  const gate = document.createElement('div');
  gate.id = 'beta-gate';
  gate.innerHTML = `
    <div style="position:fixed;inset:0;background:var(--ink,#0f1923);display:flex;align-items:center;justify-content:center;padding:24px;z-index:9999;">
      <div style="background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,0.4);animation:gateIn 0.35s cubic-bezier(0.16,1,0.3,1) both;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px;">
          <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#1d6fbf,#1a4fa0);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 12px rgba(29,111,191,0.4);">­¤¦Š</div>
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:22px;color:#0f1923;letter-spacing:-0.02em;">Receipt<span style="color:#1d6fbf;">Vault</span></div>
            <div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:0.1em;margin-top:2px;">Private Beta</div>
          </div>
        </div>
        <div style="font-size:20px;font-weight:600;color:#0f1923;margin-bottom:6px;letter-spacing:-0.02em;">Beta Access</div>
        <div style="font-size:13px;color:#64748b;margin-bottom:24px;line-height:1.6;">This is an invite-only preview. Enter your access code to continue.</div>
        <div style="margin-bottom:14px;">
          <label style="display:block;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;">Access Code</label>
          <input id="gate-input" type="password" placeholder="Enter code"
            style="width:100%;padding:13px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;color:#0f1923;background:#f8fafc;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none;"
            onkeydown="if(event.key==='Enter')submitGate()"
            onfocus="this.style.borderColor='#1d6fbf';this.style.boxShadow='0 0 0 3px rgba(29,111,191,0.12)'"
            onblur="this.style.borderColor='#e2e8f0';this.style.boxShadow='none'">
        </div>
        <div id="gate-error" style="display:none;background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;">Incorrect code. Contact WEG Consulting for access.</div>
        <button onclick="submitGate()"
          style="width:100%;padding:14px;background:linear-gradient(135deg,#1d6fbf,#1a5fa8);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 4px 14px rgba(29,111,191,0.35);">
          Continue ŌåÆ
        </button>
        <div style="text-align:center;margin-top:18px;font-size:12px;color:#94a3b8;">Don't have a code? <a href="mailto:hello@wegconsulting.com?subject=ReceiptVault Beta Access" style="color:#1d6fbf;text-decoration:none;font-weight:500;">Request access</a></div>
      </div>
    </div>
    <style>
      @keyframes gateIn { from { opacity:0; transform:translateY(20px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
    </style>`;
  document.body.appendChild(gate);
  setTimeout(() => document.getElementById('gate-input')?.focus(), 100);
}

function submitGate() {
  const val = document.getElementById('gate-input')?.value || '';
  if (val === BETA_PASS) {
    sessionStorage.setItem(GATE_KEY, '1');
    document.getElementById('beta-gate')?.remove();
    document.getElementById('app').style.display = '';
    init();
  } else {
    const err = document.getElementById('gate-error');
    const inp = document.getElementById('gate-input');
    if (err) err.style.display = 'block';
    if (inp) { inp.value = ''; inp.focus(); inp.style.borderColor = '#dc2626'; }
    setTimeout(() => { if (inp) inp.style.borderColor = '#e2e8f0'; }, 1500);
  }
}

// ŌöĆŌöĆ INIT ŌöĆŌöĆ
function init() {
  loadState();
  render();
  initSwitcher();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    if (checkGate()) { init(); } else { showGate(); }
  });
} else {
  if (checkGate()) { init(); } else { showGate(); }
}
</script>
</body>
</html>
